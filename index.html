<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정보 기말고사 대비 모의고사 | 이든관리형학습센터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;900&family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap">
<style>
:root{
  --navy-deep:#0a0f1f;
  --navy:#0f1830;
  --navy-card:#15203d;
  --navy-card2:#1a2747;
  --line:rgba(201,169,97,.22);
  --line-strong:rgba(201,169,97,.4);
  --gold:#c9a961;
  --gold-bright:#e9cd7c;
  --gold-dim:rgba(201,169,97,.14);
  --ink:#eef0f6;
  --ink-dim:#8e9ab8;
  --ink-faint:#5d6786;
  --good:#5fb88a;
  --good-dim:rgba(95,184,138,.12);
  --bad:#d6564a;
  --bad-dim:rgba(214,86,74,.12);
  --radius:16px;
  --serif:'Noto Serif KR',serif;
  --sans:'Noto Sans KR',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(201,169,97,.10), transparent 60%),
    var(--navy-deep);
  color:var(--ink);
  font-family:var(--sans);
  min-height:100vh;
  line-height:1.6;
}
::selection{background:var(--gold);color:var(--navy-deep);}
button{font-family:inherit;cursor:pointer;}
.app{max-width:880px;margin:0 auto;padding:0 18px 60px;}

/* ===== Masthead ===== */
.masthead{
  padding:36px 0 22px;
  text-align:center;
  border-bottom:1px solid var(--line);
  margin-bottom:28px;
  position:relative;
}
.masthead .eyebrow{
  font-size:12px;letter-spacing:.25em;color:var(--gold);
  font-weight:700;text-transform:uppercase;
}
.masthead h1{
  font-family:var(--serif);
  font-size:clamp(22px,5vw,30px);
  font-weight:900;
  margin:10px 0 6px;
  color:var(--ink);
  letter-spacing:-.01em;
}
.masthead .sub{
  font-size:13.5px;color:var(--ink-dim);
}
.masthead .sub b{color:var(--gold-bright);font-weight:700;}

/* progress strip */
.progress-strip{
  display:flex;align-items:center;gap:12px;
  margin:18px auto 0;max-width:420px;
}
.progress-strip .bar{
  flex:1;height:6px;border-radius:99px;background:rgba(255,255,255,.06);
  overflow:hidden;border:1px solid var(--line);
}
.progress-strip .bar i{
  display:block;height:100%;
  background:linear-gradient(90deg,var(--gold),var(--gold-bright));
  border-radius:99px;transition:width .4s ease;
}
.progress-strip span{font-size:12px;color:var(--ink-dim);white-space:nowrap;font-weight:600;}

/* ===== Round menu ===== */
.round-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:8px;
}
@media(min-width:640px){.round-grid{grid-template-columns:repeat(4,1fr);}}
.round-card{
  background:var(--navy-card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px 14px 16px;
  text-align:left;
  position:relative;
  overflow:hidden;
  transition:transform .15s ease, border-color .15s ease;
}
.round-card:hover{border-color:var(--line-strong);transform:translateY(-2px);}
.round-card .rc-top{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:10px;
}
.round-card .rc-num{
  font-family:var(--serif);font-weight:900;font-size:26px;color:var(--gold-bright);
  line-height:1;
}
.round-card .rc-badge{
  font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:99px;
  border:1px solid var(--line);color:var(--ink-faint);white-space:nowrap;
}
.round-card .rc-badge.done{
  color:var(--good);border-color:rgba(95,184,138,.45);background:var(--good-dim);
}
.round-card .rc-range{font-size:12.5px;color:var(--ink-dim);font-weight:600;margin-bottom:3px;}
.round-card .rc-type{font-size:11.5px;color:var(--ink-faint);}
.round-card .rc-stat{
  margin-top:10px;font-size:11px;color:var(--gold-bright);font-weight:700;
}
.round-card button.go{
  width:100%;margin-top:12px;padding:8px 0;
  background:transparent;border:1px solid var(--line-strong);
  color:var(--ink);border-radius:9px;font-size:12.5px;font-weight:700;
  transition:background .15s ease, color .15s ease;
}
.round-card button.go:hover{background:var(--gold);color:var(--navy-deep);border-color:var(--gold);}

/* ===== Exam paper ===== */
.exam-head{
  background:var(--navy-card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:22px 22px 18px;
  margin-bottom:18px;
}
.exam-head .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.exam-head h2{
  font-family:var(--serif);font-size:19px;font-weight:900;margin:0 0 4px;
}
.exam-head .meta{font-size:12.5px;color:var(--ink-dim);}
.exam-head .attempt-chip{
  font-size:11.5px;font-weight:700;color:var(--gold-bright);
  border:1px solid var(--line-strong);padding:4px 10px;border-radius:99px;white-space:nowrap;
}
.exam-head .instructions{
  margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);
  font-size:12px;color:var(--ink-faint);line-height:1.7;
}
.exam-head .name-field{
  margin-top:12px;display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-dim);
}
.exam-head .name-field input{
  background:var(--navy);border:1px solid var(--line);border-radius:6px;
  color:var(--ink);padding:5px 10px;font-size:12.5px;font-family:inherit;width:160px;
}

.exam-paper{
  background:var(--navy-card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:6px 22px 8px;
}
.q-item{
  padding:22px 0;border-bottom:1px dashed var(--line);position:relative;
}
.q-item:last-child{border-bottom:none;}
.q-item.graded.correct{ background:linear-gradient(90deg, var(--good-dim), transparent 40%); margin:0 -22px;padding:22px;padding-right:78px;border-radius:10px;}
.q-item.graded.wrong{ background:linear-gradient(90deg, var(--bad-dim), transparent 40%); margin:0 -22px;padding:22px;padding-right:78px;border-radius:10px;}
.q-head{display:flex;gap:10px;align-items:flex-start;}
.q-num{
  font-family:var(--serif);font-weight:900;color:var(--gold);font-size:16px;
  flex-shrink:0;min-width:34px;
}
.q-text{font-size:14.5px;color:var(--ink);font-weight:500;white-space:pre-line;}
.q-tag{display:inline-block;font-size:10px;font-weight:700;color:var(--ink-faint);border:1px solid var(--line);border-radius:5px;padding:1px 6px;margin-left:6px;vertical-align:middle;}

.code-block{
  margin:10px 0 4px 44px;background:#070b16;border-left:3px solid var(--gold);
  border-radius:8px;padding:12px 16px;font-family:var(--mono);font-size:12.5px;
  color:#cfe0ff;white-space:pre;overflow-x:auto;line-height:1.55;
}

.options{margin:12px 0 0 44px;display:flex;flex-direction:column;gap:5px;}
.opt-label{
  display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border-radius:9px;
  border:1px solid transparent;font-size:13.5px;color:var(--ink-dim);
  transition:background .12s ease;
}
.opt-label:hover{background:rgba(255,255,255,.04);}
.opt-label input{accent-color:var(--gold);margin-top:2px;flex-shrink:0;}
.opt-label .opt-circle{font-family:var(--serif);font-weight:700;color:var(--gold);flex-shrink:0;}
.opt-label.is-correct{background:var(--good-dim);color:var(--ink);border-color:rgba(95,184,138,.4);}
.opt-label.is-wrong-pick{background:var(--bad-dim);color:var(--ink);border-color:rgba(214,86,74,.4);}

.short-area{margin:12px 0 0 44px;}
.short-area textarea{
  width:100%;min-height:74px;background:var(--navy);border:1px solid var(--line);
  border-radius:9px;color:var(--ink);padding:10px 12px;font-family:inherit;font-size:13.5px;
  resize:vertical;
}
.short-area textarea:focus{outline:none;border-color:var(--gold);}
.short-reveal{
  margin-top:10px;padding:12px 14px;background:var(--navy);border-radius:9px;
  border:1px solid var(--line);font-size:13px;
}
.short-reveal .label{color:var(--gold-bright);font-weight:700;font-size:11.5px;margin-bottom:4px;}
.short-reveal .ans{color:var(--ink);white-space:pre-line;}
.self-grade-btns{margin-top:10px;display:flex;gap:8px;}
.self-grade-btns button{
  flex:1;padding:8px 0;border-radius:8px;border:1px solid var(--line-strong);
  background:transparent;color:var(--ink);font-size:12.5px;font-weight:700;
}
.self-grade-btns button.sel-correct{background:var(--good);color:var(--navy-deep);border-color:var(--good);}
.self-grade-btns button.sel-wrong{background:var(--bad);color:#fff;border-color:var(--bad);}
.self-status{margin-top:8px;font-size:12px;font-weight:700;}
.self-status.correct{color:var(--good);}
.self-status.wrong{color:var(--bad);}

.exp-box{
  margin:10px 0 0 44px;padding:10px 14px;background:var(--navy);border-radius:9px;
  border:1px solid var(--line);font-size:12.5px;color:var(--ink-dim);
}
.exp-box b{color:var(--gold-bright);}

.stamp{
  position:absolute;top:14px;right:6px;width:54px;height:54px;border-radius:50%;
  border:2.6px solid var(--bad);color:var(--bad);display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-weight:900;font-size:22px;transform:rotate(-10deg);
  opacity:.88;mix-blend-mode:screen;animation:stampIn .3s cubic-bezier(.2,1.4,.5,1);
  background:rgba(214,86,74,.05);
}
.stamp.ok{border-color:var(--good);color:var(--good);background:rgba(95,184,138,.05);}
@keyframes stampIn{from{transform:rotate(-10deg) scale(1.8);opacity:0;}to{transform:rotate(-10deg) scale(1);opacity:.88;}}

/* ===== Score bar ===== */
.score-bar{
  position:sticky;top:0;z-index:5;
  background:linear-gradient(180deg, var(--navy-deep) 70%, transparent);
  padding:14px 0 10px;margin-bottom:6px;
}
.score-card{
  background:var(--navy-card2);border:1px solid var(--line-strong);border-radius:var(--radius);
  padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
}
.score-card .score-num{font-family:var(--serif);font-weight:900;font-size:26px;color:var(--gold-bright);}
.score-card .score-label{font-size:12px;color:var(--ink-dim);}
.score-card .actions{display:flex;gap:8px;}
.btn{
  padding:10px 18px;border-radius:10px;border:1px solid var(--line-strong);
  background:transparent;color:var(--ink);font-size:13px;font-weight:700;
}
.btn.primary{background:var(--gold);color:var(--navy-deep);border-color:var(--gold);}
.btn.primary:hover{background:var(--gold-bright);}
.btn:hover{border-color:var(--gold);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn.ghost{border-color:var(--line);color:var(--ink-dim);}

.pending-note{font-size:11.5px;color:var(--ink-faint);margin-top:4px;}

/* ===== Bottom action bar ===== */
.bottom-bar{
  display:flex;justify-content:center;gap:10px;margin-top:22px;flex-wrap:wrap;
}

/* ===== Completion screen ===== */
.complete-wrap{
  text-align:center;padding:60px 20px;background:var(--navy-card);
  border:1px solid var(--line-strong);border-radius:var(--radius);position:relative;overflow:hidden;
}
.complete-wrap .big-stamp{
  width:120px;height:120px;border-radius:50%;border:4px solid var(--gold);
  display:flex;align-items:center;justify-content:center;margin:0 auto 22px;
  transform:rotate(-8deg);color:var(--gold);font-family:var(--serif);font-weight:900;
  font-size:16px;line-height:1.3;animation:stampIn .4s cubic-bezier(.2,1.4,.5,1);
  background:rgba(201,169,97,.06);
}
.complete-wrap h3{font-family:var(--serif);font-size:24px;margin:0 0 8px;}
.complete-wrap p{color:var(--ink-dim);font-size:13.5px;margin:0 0 26px;}

/* ===== back link ===== */
.back-link{
  display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--ink-dim);
  background:none;border:none;padding:0;margin-bottom:14px;
}
.back-link:hover{color:var(--gold-bright);}

footer.copyright{
  text-align:center;margin-top:46px;padding-top:18px;border-top:1px solid var(--line);
  font-size:11px;color:var(--ink-faint);line-height:1.8;
}
footer.copyright b{color:var(--ink-dim);}

@media(prefers-reduced-motion: reduce){
  .stamp,.complete-wrap .big-stamp{animation:none;}
  .round-card{transition:none;}
}
@media(max-width:480px){
  .code-block,.options,.short-area,.exp-box{margin-left:0;}
  .q-num{min-width:26px;font-size:14.5px;}
  .stamp{width:46px;height:46px;font-size:18px;top:8px;right:2px;}
  .q-item.graded.correct,.q-item.graded.wrong{margin:0 -14px;padding:16px;padding-right:64px;}
  .exam-paper{padding:6px 14px 8px;}
  .exam-head{padding:18px 16px 14px;}
  .app{padding:0 12px 60px;}
}
</style>
</head>
<body>
<div class="app">
  <div class="masthead">
    <div class="eyebrow">EDEN MANAGED LEARNING CENTER</div>
    <h1>정보(컴퓨터) 기말고사 대비 모의고사</h1>
    <div class="sub">하남고등학교 1학년 정보 · 전 200문항 · <b>이든관리형학습센터</b> 제작</div>
    <div class="progress-strip">
      <div class="bar"><i id="progress-fill" style="width:0%"></i></div>
      <span id="progress-text">0 / 8 회차 완료</span>
    </div>
  </div>
  <main id="view-root"></main>
  <footer class="copyright">
