  </footer>
</div>

<script id="quiz-data" type="application/json">
[{"id": 1, "type": "mcq", "q": "디지털 데이터를 압축할 때, 데이터를 더 작은 크기의 특정 형식으로 변환하는 과정과 이를 다시 원래 형태로 복원하는 과정을 순서대로 바르게 짝지은 것은?", "code": null, "options": ["암호화 - 복호화", "디코딩 - 인코딩", "인코딩 - 디코딩", "컴파일 - 인터프리터", "모델링 - 추상화"], "answer": 2, "exp": "데이터를 더 작은 크기로 변환하는 것은 '인코딩(Encoding)', 다시 복원하는 과정은 '디코딩(Decoding)'이다."}, {"id": 2, "type": "mcq", "q": "다음 중 비손실 압축(Lossless Compression)에 대한 설명으로 가장 적절한 것은?", "code": null, "options": ["사람의 눈이나 귀로 잘 인식하지 못하는 미세한 정보를 제거하여 용량을 줄인다.", "압축을 해제하여 복원했을 때 원래의 입력 데이터와 완벽하게 동일하다.", "압축률이 매우 높아 고화질 사진이나 MP3 소리 파일에 주로 사용된다.", "약간의 화질이나 음질 손실이 발생하지만 파일 크기를 획기적으로 줄일 수 있다.", "JPEG와 AAC 파일 형식이 대표적인 비손실 압축 방식이다."], "answer": 1, "exp": "비손실 압축은 압축 후 복원했을 때 원래의 입력 데이터와 100% 완벽히 일치하는 방식이다."}, {"id": 3, "type": "mcq", "q": "문자열 압축 방식 중 '런-렝스(Run-Length) 인코딩'을 적용하여 문자열 AAAAABBBCC를 압축한 결과로 알맞은 것은?", "code": null, "options": ["A5B3C2", "5A3B2C", "(5,A)(3,B)(2,C)", "A(5)B(3)C(2)", "ABC532"], "answer": 1, "exp": "런-렝스 인코딩은 연속되는 글자를 '반복 횟수와 문자의 쌍'으로 표현한다. A가 5번, B가 3번, C가 2번이므로 5A3B2C가 적절하다."}, {"id": 4, "type": "mcq", "q": "다음 이미지 압축 파일 형식에 대한 설명으로 옳지 않은 것은?", "code": null, "options": ["BMP: 압축을 하지 않아 화질은 매우 뛰어나지만 용량이 커서 인터넷 공유에 불리하다.", "PNG: 품질 손실 없이 이미지를 압축하는 비손실 압축 파일 형식이다.", "JPEG: 미세한 색상 차이를 제거하여 용량을 줄이는 손실 압축 파일 형식이다.", "GIF: 트루 컬러(24비트)를 지원하여 수많은 색상을 화질 손상 없이 압축할 수 있다.", "GIF: 지원 가능한 색상이 256개 이하이므로 정보 손실이 발생할 수 있다."], "answer": 3, "exp": "256개 이하의 색상만 지원하여 정보 손실이 발생하는 방식은 GIF이다. PNG와 JPEG는 그 이상의 색상을 지원한다."}, {"id": 5, "type": "mcq", "q": "다음 중 디지털 소리 데이터 파일 형식과 그 특징이 바르게 연결된 것은?", "code": null, "options": ["WAV - 사람의 귀에 안 들리는 주파수를 깎아내어 용량을 줄인 손실 압축 형식", "FLAC - 수학적 차이 등을 이용해 데이터 손실 없이 압축하는 비손실 압축 형식", "MP3 - 아날로그 신호를 100% 그대로 디지털로 변환한 무압축 파일 형식", "AAC - MP3보다 음질은 떨어지지만 용량이 훨씬 작은 비손실 압축 형식", "WAV - 소리 압축 방식 중 압축률이 가장 높아 스트리밍 서비스에 적합한 형식"], "answer": 1, "exp": "FLAC은 소리 데이터의 손실 없이 압축하는 비손실 압축 파일 형식이다. MP3와 AAC는 손실 압축 형식이다."}, {"id": 6, "type": "mcq", "q": "디지털 데이터 암호화의 4가지 구성 요소에 해당하지 않는 것은?", "code": null, "options": ["평문", "암호문", "해시값", "키(Key)", "암호 알고리즘"], "answer": 2, "exp": "디지털 암호화는 평문, 암호문, 키, 암호 알고리즘 4가지로 구성된다. 해시값은 해시 함수의 결괏값일 뿐이다."}, {"id": 7, "type": "mcq", "q": "고대 및 근대 암호화 방식 중, 평문의 문자를 일정한 거리(키값)만큼 평행 이동하여 다른 문자로 대체하는 암호화 방식은 무엇인가?", "code": null, "options": ["스키테일 암호", "카이사르 암호", "에니그마", "해시 함수", "디지털 서명"], "answer": 1, "exp": "평문의 알파벳을 일정한 키만큼 평행 이동하여 다른 문자로 치환하는 암호는 '카이사르 암호'이다."}, {"id": 8, "type": "mcq", "q": "암호화할 때 사용하는 키(Key)와 복호화할 때 사용하는 키가 동일한 암호 알고리즘 방식은 무엇인가?", "code": null, "options": ["공개키 암호화", "비대칭키 암호화", "대칭키 암호화", "블록체인 암호화", "해시 함수 암호화"], "answer": 2, "exp": "송신자와 수신자가 암호화와 복호화에 동일한 키를 사용하는 알고리즘을 '대칭키 알고리즘'이라고 한다."}, {"id": 9, "type": "mcq", "q": "입력값이 같으면 항상 고정된 길이의 동일한 결괏값을 반환하지만, 이를 역으로 계산하여 원래의 평문을 알아내는 것(복호화)은 불가능한 단방향 암호화 기술은?", "code": null, "options": ["디지털 서명", "전치 암호", "해시 함수", "HTTPS", "에니그마"], "answer": 2, "exp": "일정한 규칙을 적용해 고정된 길이의 해시값을 출력하며 복호화가 불가능한 것은 '해시 함수'이다."}, {"id": 10, "type": "mcq", "q": "빅데이터의 5가지 핵심 특징(5V)에 해당하지 않는 것은?", "code": null, "options": ["규모 (Volume)", "속도 (Velocity)", "다양성 (Variety)", "시각화 (Visualization)", "가치 (Value)"], "answer": 3, "exp": "빅데이터의 5V는 규모(Volume), 속도(Velocity), 다양성(Variety), 정확성(Veracity), 가치(Value)이다."}, {"id": 11, "type": "mcq", "q": "다음 중 '정형 데이터(Structured Data)'에 해당하는 것만을 고른 것은?", "code": null, "options": ["유튜브 동영상 파일", "병원의 환자 진단서(PDF)", "스마트폰 음성 녹음 파일", "행과 열로 구분된 회원 명부(CSV)", "SNS에 작성된 텍스트 리뷰"], "answer": 3, "exp": "표나 CSV 파일처럼 행과 열로 고정된 구조를 가진 데이터를 '정형 데이터'라고 부른다. 동영상이나 음성은 '비정형 데이터'이다."}, {"id": 12, "type": "mcq", "q": "빅데이터 분석 과정 4단계를 순서대로 바르게 나열한 것은?", "code": null, "options": ["데이터 수집하기 → 문제 정의하기 → 공유 및 평가하기 → 데이터 분석하기", "문제 정의하기 → 데이터 수집하기 → 데이터 분석하기 → 공유 및 평가하기", "문제 정의하기 → 데이터 분석하기 → 데이터 수집하기 → 공유 및 평가하기", "데이터 분석하기 → 데이터 수집하기 → 문제 정의하기 → 공유 및 평가하기", "문제 정의하기 → 데이터 수집하기 → 공유 및 평가하기 → 데이터 분석하기"], "answer": 1, "exp": "빅데이터 분석 과정은 [문제 정의하기] → [데이터 수집하기] → [데이터 분석하기] → [공유 및 평가하기] 순서로 진행된다."}, {"id": 13, "type": "mcq", "q": "데이터 전처리 단계에서 정상적인 데이터 분포 범위를 크게 벗어나서 분석 결과를 왜곡할 수 있는 특이한 값을 의미하는 용어는?", "code": null, "options": ["결측치", "이상치", "중복값", "편향성", "최빈값"], "answer": 1, "exp": "정상적인 데이터 분포에서 크게 벗어나 분석 결과를 왜곡시키는 값을 '이상치'라고 한다."}, {"id": 14, "type": "mcq", "q": "수집한 빅데이터를 색채, 도형, 그래프 등으로 표현하여 데이터 간의 흐름과 관계를 직관적으로 해석하는 과정은 무엇인가?", "code": null, "options": ["데이터 수집", "데이터 전처리", "데이터 시각화", "데이터 암호화", "데이터 모델링"], "answer": 2, "exp": "색채, 도형 등으로 데이터를 표현해 쉽게 파악하게 하는 과정을 '데이터 시각화'라고 한다."}, {"id": 15, "type": "mcq", "q": "빅데이터를 수집할 때 고려해야 할 윤리적 유의 사항으로 옳지 않은 것은?", "code": null, "options": ["타인의 저작물이 포함되어 있는지 저작권 문제를 확인한다.", "수집된 데이터에 이름, 전화번호 등 개인 정보가 노출되지 않도록 한다.", "데이터가 특정 인종, 성별 등에 치우치지 않았는지 데이터 편향성을 점검한다.", "데이터양의 균형을 맞추어 한쪽 특성만 과도하게 수집되지 않도록 주의한다.", "빠른 수집을 위해 타 사이트의 비공개 데이터도 크롤러를 이용해 강제로 수집한다."], "answer": 4, "exp": "데이터 수집 시 저작권, 개인 정보, 데이터 편향성 등을 고려해야 하며 무단으로 강제 수집하는 행위는 윤리 및 법에 어긋난다."}, {"id": 16, "type": "mcq", "q": "문제 분석 단계에서 파악해야 할 4가지 요소가 아닌 것은?", "code": null, "options": ["현재 상태", "목표 상태", "요구 사항", "제약 조건", "추상화 과정"], "answer": 4, "exp": "문제 분석 단계에서는 현재 상태, 목표 상태, 요구 사항, 제약 조건 4가지를 파악해야 한다. 추상화 과정은 이후의 단계이다."}, {"id": 17, "type": "mcq", "q": "크고 복잡한 문제를 단순화하는 '추상화(Abstraction)'의 두 가지 주요 세부 단계로 알맞은 것은?", "code": null, "options": ["문제 분해, 핵심 요소 추출", "알고리즘 설계, 프로그래밍", "데이터 수집, 데이터 시각화", "현재 상태 정의, 목표 상태 정의", "인코딩, 디코딩"], "answer": 0, "exp": "추상화는 복잡한 문제를 작은 단위로 나누는 '문제 분해'와 꼭 필요한 것만 남기는 '핵심 요소 추출'의 두 단계로 이루어진다."}, {"id": 18, "type": "mcq", "q": "추출한 핵심 요소들을 이해하기 쉽게 단순화 및 구조화하는 '모델링(Modeling)' 방식 중, 나뭇가지와 뿌리가 뻗어 나가는 모습처럼 상하위 데이터 간의 '계층적인 관계'를 표현하는 구조는?", "code": null, "options": ["표 (Table)", "트리 (Tree)", "그래프 (Graph)", "배열 (Array)", "해시 (Hash)"], "answer": 1, "exp": "나뭇가지처럼 위에서 아래로 뻗어 나가며 계층적 관계를 표현하는 것은 트리(Tree) 구조이다."}, {"id": 19, "type": "mcq", "q": "모델링 방식 중 데이터 항목인 '노드(Node)'와 이들을 연결하는 '간선(Edge)'으로 구성되며, 지하철 노선도처럼 노드 간의 순환 구조(사이클)를 표현할 수 있는 방식은?", "code": null, "options": ["트리 (Tree)", "그래프 (Graph)", "표 (Table)", "알고리즘 (Algorithm)", "데이터베이스 (Database)"], "answer": 1, "exp": "노드와 간선으로 이루어지며 순환 구조(사이클)가 허용되는 복잡한 연결 관계 모델링은 그래프(Graph) 구조이다."}, {"id": 20, "type": "mcq", "q": "알고리즘을 설계할 때 사용되는 3가지 기본 제어 구조가 아닌 것은?", "code": null, "options": ["순차 구조", "선택 구조", "반복 구조", "객체 구조", "없음 (모두 제어 구조에 해당함)"], "answer": 3, "exp": "알고리즘을 설계하는 3대 제어 구조는 '순차, 선택, 반복 구조'이다."}, {"id": 21, "type": "mcq", "q": "알고리즘을 표현하는 방법 중 하나로, 특정 프로그래밍 언어의 문법에 얽매이지 않고 사람의 일상적인 언어와 프로그래밍 코드를 섞어 논리적 흐름을 흉내 내어 기술하는 방법은?", "code": null, "options": ["자연어", "순서도(Flowchart)", "블록 코딩", "의사 코드(Pseudocode)", "소스 코드"], "answer": 3, "exp": "일반적인 언어와 프로그래밍 코드를 섞어서 논리를 표현하는 방법은 '의사 코드(Pseudocode)'이다."}, {"id": 22, "type": "mcq", "q": "효율적인 알고리즘이 갖추어야 할 두 가지 핵심 조건으로 가장 알맞은 것은?", "code": null, "options": ["수행 시간이 짧고, 기억 장소(메모리) 사용량이 적어야 한다.", "수행 시간이 길고, 기억 장소 사용량이 적어야 한다.", "수행 시간이 짧고, 기억 장소 사용량이 많아야 한다.", "코드가 길고, 실행 횟수가 많아야 한다.", "변수가 많고, 함수가 적어야 한다."], "answer": 0, "exp": "좋은 알고리즘은 수행 시간이 짧고, 기억 장소(메모리) 사용량이 적어야 한다."}, {"id": 23, "type": "mcq", "q": "나열된 데이터를 처음부터 끝까지 차례대로 하나씩 비교하면서 목적 데이터를 찾는 가장 단순한 형태의 탐색 알고리즘은?", "code": null, "options": ["이진 탐색", "순차 탐색", "버블 정렬", "선택 정렬", "해시 탐색"], "answer": 1, "exp": "리스트의 맨 앞부터 차례대로 목적 데이터를 비교하며 탐색하는 방법은 '순차 탐색'이다."}, {"id": 24, "type": "mcq", "q": "탐색 범위를 절반씩 좁혀나가면서 데이터를 찾는 방식으로, 탐색 전에 데이터가 반드시 오름차순이나 내림차순으로 '정렬'되어 있어야만 사용할 수 있는 탐색 알고리즘은?", "code": null, "options": ["버블 탐색", "순차 탐색", "이진 탐색", "선택 탐색", "트리 탐색"], "answer": 2, "exp": "탐색 범위를 절반씩 좁히는 것은 '이진 탐색'이며, 반드시 사전 정렬이 필요하다."}, {"id": 25, "type": "mcq", "q": "다음 중 '버블 정렬(Bubble Sort)' 알고리즘에 대한 설명으로 옳은 것은?", "code": null, "options": ["정렬되지 않은 데이터 중 가장 작은 최솟값을 찾아 기준 위치와 교환한다.", "인접한 두 개의 데이터를 차례대로 짝지어 비교하며 크기가 맞지 않으면 자리를 교환한다.", "한 번의 탐색을 통해 데이터를 두 개의 그룹으로 나눈다.", "탐색 알고리즘 중 가장 속도가 빠른 알고리즘이다.", "데이터가 미리 정렬되어 있어야만 사용할 수 있다."], "answer": 1, "exp": "버블 정렬은 바로 옆에 붙어 있는(인접한) 두 개의 데이터를 차례대로 비교하여 교환하는 방식이다."}, {"id": 26, "type": "mcq", "q": "정렬되지 않은 배열에서 전체를 비교하여 '최솟값(또는 최댓값)'을 찾은 뒤, 이를 맨 앞의 기준 위치에 있는 데이터와 교환하는 방식을 반복하는 정렬 알고리즘은?", "code": null, "options": ["순차 정렬", "이진 정렬", "버블 정렬", "선택 정렬", "삽입 정렬"], "answer": 3, "exp": "최솟값(또는 최댓값)을 선택하여 맨 앞 기준 위치와 교환하는 방식은 '선택 정렬'이다."}, {"id": 27, "type": "mcq", "q": "다음의 데이터 [8, 4, 2, 1]을 오름차순으로 정렬하기 위해 '버블 정렬'의 1단계(1회전)를 수행한 직후의 데이터 상태로 옳은 것은?", "code": null, "options": ["[4, 2, 8, 1]", "[4, 2, 1, 8]", "[1, 2, 4, 8]", "[8, 4, 2, 1]", "[2, 4, 1, 8]"], "answer": 1, "exp": "8과 4 비교 후 교환 → [4,8,2,1] / 8과 2 비교 후 교환 → [4,2,8,1] / 8과 1 비교 후 교환 → [4,2,1,8]. 가장 큰 수 8이 맨 뒤로 밀려난다."}, {"id": 28, "type": "mcq", "q": "다음의 정렬된 데이터 배열 [10, 20, 30, 40, 50, 60, 70]에서 '이진 탐색' 알고리즘을 사용하여 숫자 60을 찾으려 한다. 이때 가장 먼저 비교하게 되는 중앙값 데이터는 무엇인가? (인덱스 계산 시 소수점 이하는 버린다.)", "code": null, "options": ["20", "30", "40", "50", "60"], "answer": 2, "exp": "인덱스 0부터 6의 중앙값은 인덱스 3에 위치한 '40'이다."}, {"id": 29, "type": "mcq", "q": "데이터 압축 방식 중 렘펠-지브(Lempel-Ziv) 인코딩에서 반복되는 부분 문자열을 압축하기 위해 치환하는 두 가지 핵심 요소는 무엇인가?", "code": null, "options": ["문자와 빈도수", "노드와 간선", "시간과 속도", "상대적 위치와 패턴의 길이", "평문과 암호문"], "answer": 3, "exp": "렘펠-지브 인코딩은 부분 문자열의 '상대적 위치'와 '패턴의 길이'로 반복 문자열을 치환하여 압축한다."}, {"id": 30, "type": "mcq", "q": "컴퓨터 네트워크나 시스템에서 불법적인 침입을 막고 정상적인 접근만 허용하도록 방어하는 보안 기술의 명칭은 무엇인가?", "code": null, "options": ["라우터", "스위치", "방화벽", "크롤러", "엑세스 포인트"], "answer": 2, "exp": "허가받지 않은 불법적 침입을 막고 정상적 접근만 허용하는 네트워크 보안 기술은 '방화벽'이다."}, {"id": 31, "type": "mcq", "q": "고대 로마에서 유래한 '스키테일 암호'는 평문의 어떤 요소를 변화시켜 암호문을 만드는가?", "code": null, "options": ["문자의 출현 빈도수", "문자의 다른 알파벳 치환", "문자의 자리(위치) 바꿈", "해시값을 이용한 단방향 변환", "난수 모듈을 이용한 변환"], "answer": 2, "exp": "스키테일 암호는 막대기에 양피지를 감아 문자의 배열(자리)을 바꾸는 '전치 암호'이다."}, {"id": 32, "type": "mcq", "q": "공개키 암호화 알고리즘에 대한 설명으로 옳지 않은 것은?", "code": null, "options": ["암호화 키와 복호화 키가 서로 다르다.", "대칭키 알고리즘에 비해 키 관리가 비교적 용이하다.", "송신자는 수신자의 공개키를 이용해 평문을 암호화한다.", "암호화와 복호화에 모두 같은 비밀키를 사용한다.", "디지털 서명이나 HTTPS 통신 등의 기반 기술로 사용된다."], "answer": 3, "exp": "공개키 암호화는 암호화(공개키)와 복호화(개인키)에 서로 다른 키를 사용한다."}, {"id": 33, "type": "mcq", "q": "디지털 자산에 블록체인 기술을 적용하여 위변조가 불가능한 고유의 원본성과 소유권을 증명하는 기술(대체 불가능 토큰)은 무엇인가?", "code": null, "options": ["RFID", "NFC", "GPS", "NFT", "API"], "answer": 3, "exp": "블록체인 기술을 바탕으로 디지털 자산에 고윳값을 부여해 소유권을 증명하는 기술은 NFT이다."}, {"id": 34, "type": "mcq", "q": "일상생활의 복잡한 문제를 해결하기 쉽게 '작은 단위의 문제'로 나누는 과정을 지칭하는 용어는?", "code": null, "options": ["모델링", "핵심 요소 추출", "문제 분해", "문제 정의", "데이터 전처리"], "answer": 2, "exp": "큰 문제를 작게 나누는 과정은 추상화의 '문제 분해' 단계이다."}, {"id": 35, "type": "mcq", "q": "순서도(Flowchart) 작성 시 주어진 '조건(참/거짓)'을 판단하여 프로그램의 흐름을 여러 갈래로 분기시킬 때 사용하는 도형 기호의 모양은?", "code": null, "options": ["원형(타원)", "직사각형", "마름모", "평행사변형", "둥근 사각형"], "answer": 2, "exp": "순서도에서 조건을 판단할 때 분기점으로 사용하는 기호는 '마름모'이다."}, {"id": 36, "type": "short", "q": "디지털 데이터의 압축 방식은 크게 '비손실 압축'과 '손실 압축'으로 나뉩니다. 두 방식의 차이점을 압축 해제 후 복원된 결과의 관점에서 서술하시오.", "code": null, "answer": "비손실 압축은 데이터를 복원했을 때 원본 데이터와 100% 동일하지만, 손실 압축은 사람의 인지가 둔감한 정보를 제거하여 복원했을 때 원본 데이터와 약간의 품질 차이(손실)가 발생한다."}, {"id": 37, "type": "short", "q": "'런-렝스(Run-Length) 인코딩' 기법을 적용하여 다음 문자열을 압축한 결과를 쓰시오.\n원본 문자열: QQQQQWWWWWEEEE", "code": null, "answer": "Q5W5E4 (또는 5Q5W4E)"}, {"id": 38, "type": "short", "q": "디지털 이미지 압축 파일 형식 중 BMP 형식과 JPEG 형식의 가장 큰 차이점을 '압축 여부(손실/비손실)' 및 '용량'과 관련지어 서술하시오.", "code": null, "answer": "BMP는 무압축 파일 형식이라 용량이 매우 큰 반면, JPEG는 손실 압축 파일 형식을 적용하여 이미지 용량이 작다."}, {"id": 39, "type": "short", "q": "정보 보호를 위한 '암호화(Encryption)'와 '복호화(Decryption)'의 개념을 각각 1줄씩 서술하시오.", "code": null, "answer": "암호화는 권한이 없는 사람이 알아볼 수 없도록 평문을 암호문으로 바꾸는 과정이고, 복호화는 암호문을 다시 원래의 평문으로 되돌리는 과정이다."}, {"id": 40, "type": "short", "q": "현대 암호화 알고리즘은 크게 '대칭키 알고리즘'과 '공개키(비대칭키) 알고리즘'으로 나뉩니다. 두 알고리즘의 결정적인 차이점을 '키(Key)의 사용' 관점에서 서술하시오.", "code": null, "answer": "대칭키 알고리즘은 암호화와 복호화에 '같은(동일한) 키'를 사용하지만, 공개키 알고리즘은 암호화에 쓰는 공개키와 복호화에 쓰는 개인키가 '서로 다르다'."}, {"id": 41, "type": "short", "q": "정보 시스템에서 사용자의 패스워드(비밀번호)를 안전하게 저장하기 위해 '해시 함수(Hash Function)'를 주로 사용하는 이유를 해시 함수의 가장 큰 특성과 연관 지어 서술하시오.", "code": null, "answer": "해시 함수는 암호화만 가능하고 역계산을 통한 복호화가 불가능한 '단방향 암호화' 특성을 가지기 때문에 비밀번호 유출 시 원본 비밀번호를 알 수 없어 안전하다."}, {"id": 42, "type": "short", "q": "빅데이터의 5가지 특징(5V) 중 3가지만 제시하고 각각의 의미를 간략히 서술하시오.", "code": null, "answer": "(규모, 속도, 다양성, 정확성, 가치 중 택 3) 규모(Volume)는 방대한 데이터의 양, 속도(Velocity)는 데이터 생성 및 처리의 빠른 속도, 다양성(Variety)은 정형/비정형 등 다양한 형태를 의미한다."}, {"id": 43, "type": "short", "q": "빅데이터 분석 시 거치게 되는 '데이터 전처리' 단계에서 꼭 처리해야 하는 '결측치'와 '이상치'가 무엇인지 그 개념을 각각 서술하시오.", "code": null, "answer": "결측치는 수집되지 않고 누락된 비어있는 데이터 값이며, 이상치는 정상적인 분포 범위를 크게 벗어나 분석 결과를 왜곡할 수 있는 특이값을 의미한다."}, {"id": 44, "type": "short", "q": "실생활의 복잡한 문제를 해결하기 위한 '추상화' 과정은 크게 두 가지 세부 단계로 이루어집니다. 이 두 단계의 명칭을 차례대로 쓰시오.", "code": null, "answer": "문제 분해, 핵심 요소 추출"}, {"id": 45, "type": "short", "q": "문제 해결 모델링 방식 중 '트리(Tree)' 구조와 '그래프(Graph)' 구조의 결정적인 차이점을 '사이클(순환 구조)' 존재 여부와 연관 지어 서술하시오.", "code": null, "answer": "트리는 계층적 구조로 노드 간 순환 구조(사이클)가 발생하지 않지만, 그래프는 노드와 간선으로 연결망을 표현하여 순환 구조(사이클)가 존재할 수 있다."}, {"id": 46, "type": "short", "q": "효과적인 문제 분석을 위해 파악해야 하는 4가지 요소의 명칭을 모두 적으시오.", "code": null, "answer": "현재 상태, 목표 상태, 요구 사항, 제약 조건"}, {"id": 47, "type": "short", "q": "알고리즘을 설계할 때 사용되는 3가지 기본 제어 구조의 명칭을 적으시오.", "code": null, "answer": "순차 구조, 선택 구조, 반복 구조"}, {"id": 48, "type": "short", "q": "'버블 정렬(Bubble Sort)' 알고리즘과 '선택 정렬(Selection Sort)' 알고리즘 중, 일반적으로 데이터를 교환하는 횟수가 더 적어 효율적인 정렬 방식은 무엇인지 쓰시오.", "code": null, "answer": "선택 정렬 (Selection Sort)"}, {"id": 49, "type": "short", "q": "'이진 탐색(Binary Search)' 알고리즘이 '순차 탐색(Sequential Search)'보다 속도가 빠름에도 불구하고, 사용하기 전에 반드시 거쳐야만 하는 전제 조건은 무엇인지 서술하시오.", "code": null, "answer": "이진 탐색을 사용하기 위해서는 탐색 범위의 데이터가 사전에 '정렬(오름차순 또는 내림차순)'되어 있어야 한다."}, {"id": 50, "type": "short", "q": "좋은 알고리즘, 즉 '효율적인 알고리즘'으로 평가받기 위해 만족해야 하는 핵심 조건 2가지를 서술하시오.", "code": null, "answer": "프로그램 수행(실행) 시간이 짧아야 하며, 컴퓨터의 기억 장소(메모리) 사용량이 적어야 한다."}, {"id": 51, "type": "mcq", "q": "파이썬의 변수명 작성 규칙으로 올바른 것을 고르시오.", "code": null, "options": ["1st_score처럼 숫자로 시작할 수 있다.", "띄어쓰기(공백)를 포함하여 my score로 작성할 수 있다.", "if, for, True와 같은 예약어를 변수명으로 사용할 수 있다.", "알파벳 대소문자를 구분하지 않아 Score와 score는 같은 변수로 취급된다.", "영문자, 숫자, 한글, 밑줄(_)을 사용할 수 있으나 숫자로 시작할 수는 없다."], "answer": 4, "exp": "변수명은 문자, 숫자, 한글, 밑줄(_)로 구성할 수 있으나 숫자로 시작할 수 없다. 예약어 사용 및 공백 포함도 불가능하며, 대소문자는 철저히 구분한다."}, {"id": 52, "type": "mcq", "q": "다음 파이썬 프로그램의 실행 결과로 올바른 것은?", "code": "a = 17 % 5\nb = 2 ** 3\nprint(a + b)", "options": ["9", "10", "11", "12", "15"], "answer": 1, "exp": "17 % 5(나머지)는 2, 2 ** 3(거듭제곱)은 8이다. 2 + 8 = 10."}, {"id": 53, "type": "mcq", "q": "다음 중 논리 연산자에 대한 설명으로 옳지 않은 것은?", "code": null, "options": ["a and b: a와 b 모두가 참일 때만 결괏값이 참이 된다.", "a or b: a와 b 중 하나라도 참이면 결괏값이 참이 된다.", "not a: a값이 참이면 결괏값을 거짓으로 바꾼다.", "True and False의 연산 결과는 True이다.", "True or False의 연산 결과는 True이다."], "answer": 3, "exp": "and(논리곱)는 두 조건이 모두 True일 때만 True이다. True and False는 False이다."}, {"id": 54, "type": "mcq", "q": "파이썬에서 input() 함수를 사용할 때 나타나는 특징으로 가장 알맞은 것은?", "code": null, "options": ["키보드로 숫자를 입력하면 자동으로 정수형(int)으로 저장된다.", "괄호 안에 문자열 지시어를 넣어 화면에 안내 문구를 띄울 수 있다.", "입력된 값은 항상 실수형(float)으로 반환된다.", "입력된 값으로 산술 연산을 하려면 문자열(str) 변환 함수를 반드시 써야 한다.", "모니터 화면에 출력 결과를 보여주기 위해 사용하는 함수이다."], "answer": 1, "exp": "input()으로 입력받은 데이터는 어떠한 값을 입력해도 무조건 '문자열(str)'로 저장된다. 숫자로 연산하려면 int()나 float()로 형 변환해야 한다."}, {"id": 55, "type": "mcq", "q": "텍스트 파일 입출력에서 open(\"파일.txt\", \"a\") 명령의 \"a\" 모드가 의미하는 것은 무엇인가?", "code": null, "options": ["파일을 처음부터 읽기 전용으로 연다.", "기존 파일의 내용을 지우고 새로운 내용으로 덮어쓴다.", "기존 파일 내용의 맨 끝에 새로운 데이터를 이어 붙여(추가하여) 쓴다.", "존재하지 않는 파일을 열어 오류를 발생시킨다.", "파일을 닫고 메모리를 반환한다."], "answer": 2, "exp": "파일 열기 모드 중 a(append)는 기존 내용을 지우지 않고 파일의 맨 끝에 이어서 쓴다."}, {"id": 56, "type": "mcq", "q": "다음 코드의 실행 결과로 알맞은 것은?", "code": "a = [10, 20, 30, 40, 50]\nprint(a[1:4])", "options": ["[10, 20, 30]", "[20, 30, 40]", "[30, 40, 50]", "[20, 30, 40, 50]", "[10, 20, 30, 40]"], "answer": 1, "exp": "인덱스는 0부터 시작한다. a[1:4]는 인덱스 1부터 3(4의 이전)까지인 20, 30, 40을 추출한다."}, {"id": 57, "type": "mcq", "q": "1차원 리스트에서 맨 뒤에 새로운 데이터를 추가할 때 사용하는 파이썬 내장 함수(명령어)는?", "code": null, "options": ["insert()", "remove()", "pop()", "append()", "clear()"], "answer": 3, "exp": "리스트의 맨 끝에 요소를 추가하는 함수는 append()이다."}, {"id": 58, "type": "mcq", "q": "리스트 b = [3, 1, 4, 1, 5]가 있을 때, 이를 오름차순으로 정렬하기 위한 알맞은 명령어는?", "code": null, "options": ["b.len()", "b.sort()", "b.pop()", "b.reverse()", "b.index()"], "answer": 1, "exp": "리스트를 오름차순으로 정렬하는 함수는 sort()이다."}, {"id": 59, "type": "mcq", "q": "행과 열로 이루어진 2차원 리스트 m = [[1,2,3],[4,5,6],[7,8,9]]에서 두 번째 행, 세 번째 열의 데이터(6)에 접근하기 위한 올바른 인덱스 표현은 무엇인가? (단, 인덱스는 0부터 시작한다.)", "code": null, "options": ["m[2][3]", "m[1][2]", "m[2][1]", "m[1][3]", "m[0][2]"], "answer": 1, "exp": "행과 열의 인덱스 모두 0부터 시작하므로 두 번째 행은 인덱스 1, 세 번째 열은 인덱스 2이다. 따라서 m[1][2]가 정답이다."}, {"id": 60, "type": "mcq", "q": "파이썬 조건문(if)을 작성할 때 반드시 지켜야 할 문법적 규칙으로 옳은 것은?", "code": null, "options": ["조건문 끝에는 항상 세미콜론(;)을 붙인다.", "조건식이 참일 때 실행할 코드 블록은 중괄호{ }로 묶어야 한다.", "같은 if 블록 안에 속한 명령문들은 들여쓰기(Indentation) 위치가 반드시 일치해야 한다.", "if 조건식이 거짓이면 들여쓰기 된 명령문이 1회 무조건 실행된다.", "다중 조건문 작성 시 if 다음에는 else if 키워드를 사용해야 한다."], "answer": 2, "exp": "파이썬에서는 중괄호 대신 '들여쓰기(Indentation)'로 블록을 구분하므로 같은 블록은 무조건 들여쓰기 위치가 같아야 한다."}, {"id": 61, "type": "mcq", "q": "다중 조건문에서 여러 개의 조건을 순차적으로 검사하고자 할 때 사용하는 파이썬 명령어는?", "code": null, "options": ["if_not", "else", "elif", "and_if", "then"], "answer": 2, "exp": "다중 조건문에서 다음 조건을 연이어 검사할 때 파이썬은 else if를 줄인 elif 키워드를 사용한다."}, {"id": 62, "type": "mcq", "q": "다음 코드의 실행 결과로 올바른 것은?", "code": "score = 80\nif score >= 90:\n    print(\"A\")\nelif score >= 70:\n    print(\"B\")\nelse:\n    print(\"C\")", "options": ["A", "B", "C", "A, B", "B, C"], "answer": 1, "exp": "score가 80이므로 첫 번째 조건(>=90)은 거짓이다. 두 번째 조건(>=70)은 참이므로 \"B\"가 출력되고 조건문을 빠져나온다."}, {"id": 63, "type": "mcq", "q": "파이썬에서 range(5, 1, -2)가 생성하는 숫자의 나열로 올바른 것은?", "code": null, "options": ["5, 4, 3, 2", "5, 3, 1", "5, 3", "1, 3, 5", "5, 2"], "answer": 2, "exp": "range(시작, 끝, 증감)에서 5부터 시작해 2씩 감소하며, 끝값인 1 전까지만 생성하므로 5, 3이 생성된다."}, {"id": 64, "type": "mcq", "q": "다음 for문을 이용한 코드의 출력 결과로 옳은 것은?", "code": "for i in range(3):\n    print(i, end=\" \")", "options": ["1 2 3", "0 1 2", "3 2 1", "0 1 2 3", "1 2"], "answer": 1, "exp": "range(3)은 0부터 시작하여 3의 이전인 2까지의 숫자를 생성하므로 0, 1, 2가 출력된다."}, {"id": 65, "type": "mcq", "q": "조건식이 '참(True)'인 동안 계속해서 명령문을 반복 실행하는 제어 구조는 무엇인가?", "code": null, "options": ["for문", "if~else문", "switch문", "while문", "def문"], "answer": 3, "exp": "조건식이 참(True)인 동안 계속해서 명령을 반복하는 구조는 while문이다."}, {"id": 66, "type": "mcq", "q": "반복문을 실행하다가 특정 조건에서 반복문을 '강제로 즉시 종료'하고 빠져나오게 하는 명령어는?", "code": null, "options": ["continue", "pass", "stop", "break", "return"], "answer": 3, "exp": "조건 만족 시 반복문 전체를 강제로 종료하고 탈출하는 명령어는 break이다."}, {"id": 67, "type": "mcq", "q": "다음 코드에서 print(total)의 결괏값은?", "code": "total = 0\nfor i in range(1, 6):\n    if i == 3:\n        continue\n    total += i\nprint(total)", "options": ["15", "12", "10", "6", "3"], "answer": 1, "exp": "i가 1, 2, 4, 5일 때는 total에 누적되지만, 3일 때는 continue를 만나 아래 덧셈 코드를 건너뛰고 바로 다음 반복(4)으로 넘어간다. 1+2+4+5 = 12."}, {"id": 68, "type": "mcq", "q": "무작위(Random) 모듈을 이용해 1부터 10 사이의 임의의 정수를 추출하려고 할 때 올바른 파이썬 함수는?", "code": null, "options": ["random.choice(1, 10)", "random.randint(1, 10)", "random.sample(1, 10)", "random.float(1, 10)", "random.rand(1, 10)"], "answer": 1, "exp": "1부터 10 사이의 난수(정수)를 반환하는 random 모듈의 함수는 randint(1, 10)이다."}, {"id": 69, "type": "mcq", "q": "파이썬에서 특정 기능을 수행하는 '사용자 정의 함수'를 새롭게 만들 때 제일 먼저 사용하는 키워드는?", "code": null, "options": ["def", "fun", "function", "define", "import"], "answer": 0, "exp": "사용자 정의 함수를 만들 때는 define의 약자인 def 키워드를 사용한다."}, {"id": 70, "type": "mcq", "q": "함수의 실행 결과를 자신을 호출한 곳으로 돌려주기 위해 사용하는 명령어는 무엇인가?", "code": null, "options": ["send", "print", "yield", "return", "global"], "answer": 3, "exp": "함수의 결괏값을 호출한 메인 프로그램 등으로 반환(전달)하는 명령어는 return이다."}, {"id": 71, "type": "mcq", "q": "함수 내부에서만 선언되고 사용되어, 함수가 종료되면 메모리에서 사라지는 변수는?", "code": null, "options": ["전역 변수", "지역 변수", "상수", "정적 변수", "참조 변수"], "answer": 1, "exp": "특정 함수 내부에서 선언되어 그 안에서만 사용 가능하고 밖에서는 쓸 수 없는 변수는 '지역 변수'이다."}, {"id": 72, "type": "mcq", "q": "함수 내부에서 바깥쪽에 있는 '전역 변수'의 값을 직접 변경하려고 할 때 반드시 선언해야 하는 키워드는?", "code": null, "options": ["local", "global", "nonlocal", "outer", "public"], "answer": 1, "exp": "함수 내부에서 외부에 있는 전역 변수의 값을 직접 바꾸려면 global 전역변수명 선언이 선행되어야 한다."}, {"id": 73, "type": "mcq", "q": "파이썬에서 관련 있는 함수나 클래스를 모아 놓은 하나의 .py 파일 단위를 무엇이라 부르는가?", "code": null, "options": ["라이브러리", "패키지", "모듈", "인스턴스", "객체"], "answer": 2, "exp": "관련 함수, 변수 등을 묶어 놓은 한 개의 파이썬 코드 파일(.py)을 모듈이라고 한다."}, {"id": 74, "type": "mcq", "q": "외부 라이브러리 중에서 '표(Table) 형태의 데이터'를 쉽게 조작하고 분석하는 데 가장 최적화된 라이브러리는?", "code": null, "options": ["numpy (넘파이)", "matplotlib (맷플롯립)", "random (랜덤)", "time (타임)", "pandas (판다스)"], "answer": 4, "exp": "표 형태의 데이터 다루기에 최적화된 파이썬 외부 데이터 분석 라이브러리는 pandas이다."}, {"id": 75, "type": "mcq", "q": "데이터 시각화를 위해 선 그래프, 막대그래프, 산점도 등을 그리는 데 사용되는 파이썬 외부 라이브러리는?", "code": null, "options": ["pandas", "math", "matplotlib", "numpy", "tensorflow"], "answer": 2, "exp": "그래프와 차트를 생성해 데이터 시각화를 수행하는 라이브러리는 matplotlib이다."}, {"id": 76, "type": "mcq", "q": "객체지향 프로그래밍에 대한 설명으로 가장 옳지 않은 것은?", "code": null, "options": ["객체는 고유한 속성(변수)과 기능(메소드)을 가진 주체이다.", "클래스는 객체들을 생성하기 위한 공통된 설계도이다.", "인스턴스는 클래스를 통해 실제로 메모리에 생성된 개별 객체이다.", "하나의 클래스로는 단 하나의 인스턴스만 생성할 수 있다.", "클래스 내부의 함수를 특별히 '메소드(method)'라고 부른다."], "answer": 3, "exp": "클래스는 붕어빵 틀과 같아서 한 번 정의해두면 수십, 수백 개의 여러 인스턴스(객체)를 무한히 생성해 낼 수 있다."}, {"id": 77, "type": "mcq", "q": "파이썬에서 클래스 내부의 메소드(함수)를 정의할 때, 무조건 첫 번째 매개변수로 작성해야 하며 인스턴스 자기 자신을 가리키는 키워드는?", "code": null, "options": ["this", "me", "self", "own", "object"], "answer": 2, "exp": "클래스 내부의 메소드는 항상 첫 번째 매개변수로 인스턴스 자신을 참조하는 self를 가져야 한다."}, {"id": 78, "type": "mcq", "q": "객체가 생성될 때 속성값을 초기화하기 위해 자동으로 호출되는 특수한 메소드(생성자)의 이름은?", "code": null, "options": ["__start__", "__init__", "__main__", "__self__", "__class__"], "answer": 1, "exp": "인스턴스가 생성될 때 속성값을 초기화하는 특수한 생성자 메소드는 __init__()이다."}, {"id": 79, "type": "mcq", "q": "인간의 두뇌가 가지고 있는 특징과 비교하여 인공지능(AI)이 더 뛰어난 분야로 가장 적절한 것은?", "code": null, "options": ["직관적이고 감성적인 판단", "새로운 아이디어의 창출", "빠르고 정확한 대규모 수치 계산", "예상치 못한 위기 상황에서의 임기응변", "윤리적이고 도덕적인 딜레마 해결"], "answer": 2, "exp": "사람 뇌는 창의성, 직관적 판단 등에 강하고, 인공지능은 빠르고 정확한 연산, 탐색, 대규모 데이터 기억 등에 강하다."}, {"id": 80, "type": "mcq", "q": "다음 중 '지능 에이전트(Intelligent Agent)'의 4가지 핵심 특성에 속하지 않는 것은?", "code": null, "options": ["자율성 (Autonomy)", "목적성 (Proactiveness)", "적응성 (Adaptability)", "사회성 (Sociality)", "종속성 (Dependency)"], "answer": 4, "exp": "지능 에이전트의 4대 특성은 자율성, 목적성, 적응성, 사회성이다."}, {"id": 81, "type": "mcq", "q": "단순히 입력된 규칙만을 따르는 것이 아니라, 로봇 청소기나 자율주행 자동차처럼 스스로 학습하고 추론하여 상황에 맞게 행동하는 시스템을 무엇이라 하는가?", "code": null, "options": ["단순 에이전트", "엑스퍼트 시스템", "지능 에이전트", "절차적 에이전트", "센서 네트워크"], "answer": 2, "exp": "정해진 규칙에 얽매이지 않고 학습과 추론으로 스스로 행동을 개선하는 시스템을 '지능 에이전트'라고 한다."}, {"id": 82, "type": "mcq", "q": "인공지능(AI), 기계학습(ML), 딥러닝(DL)의 포함 관계를 올바르게 나타낸 것은?", "code": null, "options": ["기계학습 > 인공지능 > 딥러닝", "딥러닝 > 기계학습 > 인공지능", "인공지능 > 딥러닝 > 기계학습", "인공지능 > 기계학습 > 딥러닝", "기계학습 > 딥러닝 > 인공지능"], "answer": 3, "exp": "인공지능이 가장 넓은 개념이며, 그 안에 기계학습이 있고, 기계학습 안에 인공 신경망을 활용하는 딥러닝이 포함된다. (AI > ML > DL)"}, {"id": 83, "type": "mcq", "q": "기계학습의 유형 중, 고양이와 강아지 사진처럼 '정답(레이블)'이 주어진 데이터를 컴퓨터에 학습시켜 새로운 데이터가 무엇인지 맞히게 하는 학습 방법은?", "code": null, "options": ["지도학습", "비지도학습", "강화학습", "전이학습", "자율학습"], "answer": 0, "exp": "입력 데이터와 '정답(레이블)'을 함께 주고 학습시키는 기계학습 방식은 '지도학습'이다."}, {"id": 84, "type": "mcq", "q": "기계학습의 '비지도학습' 방법 중 하나로, 정답이 없는 데이터들의 특징을 분석하여 서로 비슷한 성향을 가진 데이터끼리 그룹화하는 기법은?", "code": null, "options": ["선형 회귀", "군집화 (Clustering)", "의사결정트리", "로지스틱 회귀", "k-최근접 이웃(kNN)"], "answer": 1, "exp": "정답이 주어지지 않은 상태에서 데이터의 성향과 특징을 분석해 비슷한 것끼리 묶는 비지도학습 방식을 '군집화(Clustering)'라 한다."}, {"id": 85, "type": "mcq", "q": "사용자의 질문에 단순히 웹페이지를 검색해 주는 것을 넘어, 대규모 언어 모델을 바탕으로 글, 이미지, 프로그래밍 코드 등 새로운 콘텐츠를 직접 만들어내는 인공지능 기술은?", "code": null, "options": ["생성형 AI (Generative AI)", "메타버스 (Metaverse)", "블록체인 (Blockchain)", "사물 인터넷 (IoT)", "증강 현실 (AR)"], "answer": 0, "exp": "대규모 데이터 학습을 바탕으로 단순 검색을 넘어 새로운 글, 그림, 음악 콘텐츠를 창작해내는 인공지능을 '생성형 AI'라 부른다."}, {"id": 86, "type": "short", "q": "파이썬의 산술 연산자 중 / (일반 나눗셈)과 구분되는 // 연산자와 % 연산자의 기능을 각각 서술하시오.", "code": null, "answer": "// 연산자는 나눗셈 연산 후의 '몫'을 구하고, % 연산자는 나눗셈 연산 후의 '나머지'를 구한다."}, {"id": 87, "type": "short", "q": "age = input(\"나이를 입력하세요: \") 명령을 통해 키보드로 숫자 18을 입력받았습니다. 이후 age + 2 와 같은 덧셈(산술 연산)을 하려면 코드를 어떻게 수정하거나 보완해야 하는지 그 이유(자료형)와 함께 서술하시오.", "code": null, "answer": "input() 함수로 입력받은 데이터는 기본적으로 '문자열(str)' 자료형으로 취급되므로, 덧셈과 같은 산술 연산을 하려면 age = int(input(\"나이를 입력하세요: \"))와 같이 int() 함수를 씌워 정수형(수치형)으로 형 변환을 해주어야 한다."}, {"id": 88, "type": "short", "q": "파일 입출력을 위한 open(\"data.txt\", \"w\") 코드에서 \"w\"(쓰기 모드)를 사용하면 기존 파일에 데이터가 있을 때 어떤 일이 발생하는지 서술하시오.", "code": null, "answer": "\"w\"(쓰기) 모드로 파일을 열면 파일에 기존 데이터가 있더라도 그 내용이 모두 지워지고 새로운 내용으로 덮어쓰기가 된다."}, {"id": 89, "type": "short", "q": "파이썬에서 if문이나 for문 내부의 명령문들을 작성할 때, 컴퓨터가 이 명령문들이 해당 제어 구조에 속해 있음을 인식하게 하기 위해 반드시 지켜야 하는 문법적 규칙이 무엇인지 서술하시오.", "code": null, "answer": "같은 조건문이나 반복문의 코드 블록(영역) 안에 포함된 명령문들은 반드시 시작 위치를 띄우는 들여쓰기(Indentation)가 똑같이 일치해야 한다."}, {"id": 90, "type": "short", "q": "반복문 for i in range(1, 6, 2):가 실행될 때, 변수 i에 차례대로 대입되어 출력되는 숫자를 모두 나열하시오.", "code": null, "answer": "1, 3, 5 (1부터 시작하여 2씩 증가하고, 6 미만의 수까지만 반복되므로)"}, {"id": 91, "type": "short", "q": "반복문을 제어하는 명령어인 break문과 continue문의 기능적 차이점을 서술하시오.", "code": null, "answer": "break문은 만나는 즉시 해당 반복문을 완전히 강제 종료하고 빠져나오지만, continue문은 반복문을 종료시키지 않고 아래의 남은 명령만 건너뛴 뒤 다음 반복의 처음으로 되돌아가 계속 진행하게 한다."}, {"id": 92, "type": "short", "q": "사용자 정의 함수 내부에서 선언된 '지역 변수'가 가지는 생존 범위(사용 가능 범위)의 한계에 대해 서술하시오.", "code": null, "answer": "지역 변수는 자신이 선언된 함수 내부에서만 읽거나 값을 변경할 수 있으며, 해당 함수의 실행이 종료되면 메모리에서 사라져 바깥 프로그램에서는 사용할 수 없다."}, {"id": 93, "type": "short", "q": "파이썬에서 외부 라이브러리(예: pandas, math 등)의 기능을 현재 작성 중인 프로그램으로 불러오기 위해 사용하는 예약어(명령어)를 쓰시오.", "code": null, "answer": "import (예: import pandas, import math 등)"}, {"id": 94, "type": "short", "q": "객체지향 프로그래밍에서 '클래스(Class)'와 '인스턴스(Instance)'의 관계를 붕어빵이나 설계도 등의 비유를 들어 1줄로 서술하시오.", "code": null, "answer": "클래스가 객체를 만들어 내기 위한 공통된 '설계도(붕어빵 틀)'라면, 인스턴스는 그 클래스(틀)를 통해 실제로 구현되어 메모리에 생성된 '개별 실체(각각의 붕어빵)'이다."}, {"id": 95, "type": "short", "q": "파이썬의 클래스 내부에서 메소드를 정의할 때, 인스턴스 자기 자신을 나타내기 위해 반드시 첫 번째 매개변수로 적어주어야 하는 예약어는 무엇인지 쓰시오.", "code": null, "answer": "self"}, {"id": 96, "type": "short", "q": "주변 환경을 파악하고 스스로 판단하여 행동하는 '지능 에이전트'가 갖추어야 할 4가지 핵심 특성을 모두 쓰시오.", "code": null, "answer": "자율성, 목적성, 적응성, 사회성"}, {"id": 97, "type": "short", "q": "사람의 뇌 신경망 구조를 모방하여 인공 신경망의 연결을 깊게 구축함으로써, 복잡한 문제를 스스로 학습하고 해결하는 기계학습의 한 분야를 무엇이라 하는지 쓰시오.", "code": null, "answer": "딥러닝 (Deep Learning / 심층 신경망)"}, {"id": 98, "type": "short", "q": "티처블머신(Teachable Machine)을 이용해 컴퓨터에게 유리, 종이, 플라스틱 이미지를 정답과 함께 각각 분류하여 학습시키는 것은 기계학습의 3대 유형(지도학습, 비지도학습, 강화학습) 중 어디에 해당하는지 쓰시오.", "code": null, "answer": "지도학습 (정답 레이블을 미리 부여하여 학습시키기 때문)"}, {"id": 99, "type": "short", "q": "기계학습의 비지도학습 방식 중 '군집화(Clustering)'의 목적을 데이터의 그룹화 관점에서 간략히 서술하시오.", "code": null, "answer": "군집화는 정답이 없는 데이터의 특징을 분석하여 서로 거리가 가깝거나 비슷한 특징을 가진 데이터끼리 소그룹(군집)으로 묶는 것을 목적으로 한다."}, {"id": 100, "type": "short", "q": "사회적, 학문적 문제를 해결하기 위한 '탐색적 데이터 분석' 4단계 과정을 순서대로 차례대로 쓰시오. (단, 1단계는 '문제 정의하기'이다.)", "code": null, "answer": "[1단계] 문제 정의하기 → [2단계] 데이터 수집하기 → [3단계] 데이터 분석하기 → [4단계] 문제 해결하기 (또는 공유 및 평가하기)"}, {"id": 101, "type": "mcq", "q": "다음 문자열을 '런-렝스(Run-Length) 인코딩' 방식으로 압축할 때, 그 결과로 가장 알맞은 것은?\n원본 문자열: KKKKKYYYYYYZZ", "code": null, "options": ["K5Y6Z2", "5K6Y2Z", "K5Y6Z1", "5K6Y1Z", "KZY562"], "answer": 0, "exp": "런-렝스 인코딩은 연속되는 글자를 문자와 개수의 쌍으로 표현한다. K가 5번, Y가 6번, Z가 2번 반복되므로 K5Y6Z2가 맞다."}, {"id": 102, "type": "mcq", "q": "다음 중 이미지 데이터 압축 파일 형식에 대한 설명으로 옳은 것은?", "code": null, "options": ["BMP 형식은 데이터를 손실 압축하여 인터넷 웹페이지의 아이콘 등에 널리 쓰인다.", "GIF 형식은 트루 컬러(24비트)를 지원하여 고화질 사진을 압축하는 데 적합하다.", "JPEG 형식은 비손실 압축 방식을 사용하여 원본 데이터와 100% 동일한 화질을 보장한다.", "PNG 형식은 비손실 압축 파일 형식으로 투명한 배경을 지원하며 고품질 이미지를 유지한다.", "해상도가 높은 이미지는 무조건 압축률이 가장 높은 GIF 형식으로 변환하여 저장해야 한다."], "answer": 3, "exp": "PNG는 고화질의 투명한 배경을 지원하는 대표적인 비손실 압축 파일 형식이다. BMP는 무압축, GIF는 최대 256색만 지원, JPEG는 손실 압축 형식이다."}, {"id": 103, "type": "mcq", "q": "디지털 소리 데이터의 압축 형식인 MP3와 FLAC의 가장 큰 차이점은 무엇인가?", "code": null, "options": ["MP3는 무압축 파일이고, FLAC은 압축 파일이다.", "MP3는 손실 압축 방식이고, FLAC은 데이터 손실이 없는 비손실 압축 방식이다.", "MP3는 비손실 압축 방식이고, FLAC은 사람 귀에 안 들리는 주파수를 제거하는 손실 압축 방식이다.", "MP3는 아날로그 파형을 그대로 저장하고, FLAC은 디지털로 변환하지 않는다.", "MP3는 동영상 전용 포맷이고, FLAC은 소리 전용 포맷이다."], "answer": 1, "exp": "MP3는 사람이 인식하지 못하는 주파수 대역을 깎아내어 용량을 줄이는 손실 압축 방식이며, FLAC은 수학적 차이를 이용해 원음을 그대로 보존하는 비손실 압축 방식이다."}, {"id": 104, "type": "mcq", "q": "카이사르 암호 방식을 사용하여 평문 문자열 'BOY'를 암호화하려고 한다. 암호화 키(Key) 값이 3일 때, 변환된 암호문으로 알맞은 것은? (단, 알파벳 순서대로 우측으로 이동한다.)", "code": null, "options": ["ERB", "APX", "DQA", "CRZ", "CQA"], "answer": 0, "exp": "카이사르 암호는 키값만큼 평행 이동하는 치환 암호이다. B에서 3칸(C,D,E), O에서 3칸(P,Q,R), Y에서 3칸(Z,A,B) 이동하므로 ERB가 된다."}, {"id": 105, "type": "mcq", "q": "디지털 서명(Digital Signature) 시스템에서 수신자가 서명을 검증할 때 사용하는 키(Key)는 무엇인가?", "code": null, "options": ["수신자의 개인키", "수신자의 공개키", "송신자의 개인키", "송신자의 공개키", "인증 기관의 대칭키"], "answer": 3, "exp": "디지털 서명은 송신자만이 서명할 수 있도록 '송신자의 개인키'로 암호화하고, 수신자를 비롯한 모든 사람은 '송신자의 공개키'로 이를 복호화하여 신원을 검증한다."}, {"id": 106, "type": "mcq", "q": "블록체인(Blockchain) 기술의 특징으로 가장 거리가 먼 것은?", "code": null, "options": ["데이터를 분산된 블록에 담아 체인 형태로 연결한다.", "네트워크에 참여하는 모든 사용자에게 거래 내역을 공유한다.", "중앙 집중형 단일 서버가 모든 데이터를 독점하여 관리한다.", "데이터가 한 번 기록되면 위조나 변조가 사실상 불가능하다.", "디지털 자산의 소유권을 증명하는 NFT의 기반 기술로 사용된다."], "answer": 2, "exp": "블록체인은 중앙 집중형 단일 서버가 관리하는 것이 아니라 네트워크의 모든 사용자(P2P)에게 거래 내역이 분산 저장되어 공유되는 탈중앙화 기술이다."}, {"id": 107, "type": "mcq", "q": "빅데이터의 5가지 특징(5V) 중에서, 노이즈를 걸러내고 의사 결정에 유용하게 쓸 수 있는 '신뢰할 수 있는 데이터'를 의미하는 것은?", "code": null, "options": ["속도 (Velocity)", "다양성 (Variety)", "정확성 (Veracity)", "규모 (Volume)", "가치 (Value)"], "answer": 2, "exp": "빅데이터 5V 중 '정확성(Veracity)'은 방대한 데이터 속에서 분석에 쓸 수 있는 유용하고 신뢰할 수 있는 데이터의 품질을 뜻한다."}, {"id": 108, "type": "mcq", "q": "빅데이터 분석 과정 중 [탐색적 데이터 분석(EDA)]에서 데이터를 시각화하는 목적 및 방법으로 적절하지 않은 것은?", "code": null, "options": ["시간에 따른 데이터의 추이를 파악하기 위해 선그래프를 사용한다.", "데이터 간의 인과 관계나 연관성을 파악하기 위해 산점도를 사용한다.", "수집된 모든 비정형 데이터를 암호화하여 외부 유출을 막는다.", "여러 항목을 비교하기 위해 히트맵이나 워드 클라우드를 사용한다.", "색채, 도형 등을 이용하여 데이터의 패턴을 직관적으로 파악하게 한다."], "answer": 2, "exp": "비정형 데이터(사진, 영상 등)를 암호화하여 막는 것은 시각화(분석)의 목적이 아니다. 데이터 시각화는 도형/색채를 통해 흐름과 연관성, 차이 등을 시각적으로 분석하는 과정이다."}, {"id": 109, "type": "mcq", "q": "일상생활의 복잡한 문제를 컴퓨터로 해결하기 위한 '추상화' 과정에 대한 설명으로 올바른 것은?", "code": null, "options": ["추상화는 문제를 한 번에 해결하기 위해 전체를 묶는 과정이다.", "문제 분해 시 문제 사이의 순서와 관계는 무시하고 가장 작게만 쪼개야 한다.", "핵심 요소 추출 시 불필요한 정보와 필요한 정보를 나누는 기준은 항상 고정되어 있다.", "불필요한 요소는 과감히 버리고 문제 해결에 꼭 필요한 요소만 뽑아내는 과정이 포함된다.", "실제 세계의 모든 세부 제약 조건을 100% 동일하게 모방하여 프로그래밍하는 과정이다."], "answer": 3, "exp": "추상화는 복잡한 문제를 작은 단위로 나누고(문제 분해), 불필요한 요소는 버리며 꼭 필요한 정보만 선택(핵심 요소 추출)하여 단순화시키는 과정이다."}, {"id": 110, "type": "mcq", "q": "데이터 간의 연결 관계를 표현하는 모델링 방식 중, 공항의 항공 노선도나 친구들 간의 인물 관계도처럼 임의의 노드 간 순환(사이클) 구조가 허용되는 구조는?", "code": null, "options": ["트리(Tree) 구조", "표(Table) 구조", "큐(Queue) 구조", "배열(Array) 구조", "그래프(Graph) 구조"], "answer": 4, "exp": "그래프(Graph) 구조는 데이터(노드) 간의 연결(간선)을 그물망처럼 표현하며, 트리와 달리 순환(사이클) 구조가 허용된다."}, {"id": 111, "type": "mcq", "q": "다음 순서도 기호 중 반복문이나 조건문에서 '조건의 참/거짓을 판단'할 때 사용하는 기호의 모양은?", "code": null, "options": ["원형", "평행사변형", "직사각형", "마름모", "육각형"], "answer": 3, "exp": "순서도에서 마름모 기호(◇)는 조건의 참과 거짓을 판단하여 흐름을 갈라지게 할 때 사용한다."}, {"id": 112, "type": "mcq", "q": "다음 데이터 [8, 4, 2, 1]를 '선택 정렬(Selection Sort)'을 사용하여 오름차순으로 정렬하려 한다. 1단계(1회전)가 끝난 후 배열의 모습으로 알맞은 것은?", "code": null, "options": ["[1, 4, 2, 8]", "[4, 2, 1, 8]", "[1, 2, 4, 8]", "[8, 4, 2, 1]", "[2, 4, 1, 8]"], "answer": 0, "exp": "선택 정렬 1회전: 전체 배열에서 가장 작은 값인 1을 찾은 뒤, 맨 앞 기준 위치의 8과 교환한다. 결과는 [1, 4, 2, 8]이 된다."}, {"id": 113, "type": "mcq", "q": "이진 탐색(Binary Search) 알고리즘에 대한 설명으로 옳은 것은?", "code": null, "options": ["처음부터 끝까지 데이터를 하나씩 순서대로 비교한다.", "정렬되지 않은 데이터 배열에서도 빠르고 정확하게 데이터를 찾을 수 있다.", "탐색 범위를 한 번 비교할 때마다 절반씩 좁혀나가는 방식이다.", "소량의 데이터를 탐색할 때만 유용하며, 대용량 데이터에서는 사용할 수 없다.", "데이터를 교환하는 횟수를 최소화하기 위해 고안된 정렬 알고리즘이다."], "answer": 2, "exp": "이진 탐색은 데이터의 중앙값을 계속 비교하여 찾고자 하는 데이터가 없는 절반의 범위를 매번 버려나가며 탐색 범위를 좁히는 빠른 탐색 방식이다(단, 사전에 정렬되어 있어야 함)."}, {"id": 114, "type": "mcq", "q": "파이썬에서 변수의 이름을 지을 때 지켜야 할 규칙으로 알맞은 것은?", "code": null, "options": ["공백을 사용하여 my age와 같이 지을 수 있다.", "숫자로 시작하여 1st_place와 같이 지을 수 있다.", "파이썬 예약어인 for나 if를 변수명으로 자유롭게 쓸 수 있다.", "영문 대소문자를 구분하지 않으므로 Data와 data는 같은 변수이다.", "한글, 영문자, 밑줄(_), 숫자를 사용할 수 있으나 첫 글자에 숫자는 올 수 없다."], "answer": 4, "exp": "변수명은 영문자, 숫자, 한글, 언더바(_)를 조합하여 지을 수 있다. 공백을 포함하거나, 첫 글자를 숫자로 쓰거나, 예약어를 쓸 수는 없다. 대소문자도 엄격히 구분한다."}, {"id": 115, "type": "mcq", "q": "다음 파이썬 연산의 실행 결과로 올바른 것은?", "code": "a = 23 // 5\nb = 23 % 5\nprint(a * b)", "options": ["10", "12", "15", "20", "23"], "answer": 1, "exp": "//는 몫, %는 나머지를 구하는 연산자이다. a = 23 // 5는 4, b = 23 % 5는 3이다. 4 * 3 = 12."}, {"id": 116, "type": "mcq", "q": "키보드 입력을 처리하는 input() 함수에 대한 설명으로 가장 옳지 않은 것은?", "code": null, "options": ["키보드로 입력한 데이터는 기본적으로 문자열(str) 자료형으로 저장된다.", "화면에 안내 문구를 보여주기 위해 괄호 안에 문자열 지시어를 넣을 수 있다.", "여러 개의 값을 한 줄에 입력받기 위해 split() 메서드와 함께 자주 쓰인다.", "입력받은 값으로 사칙연산을 수행하려면 int()나 float()로 형 변환이 필요하다.", "input() 함수는 입력받은 문자의 개수를 세어주는 기능이 내장되어 있다."], "answer": 4, "exp": "input() 함수는 키보드 입력을 문자열(str)로 받아들이는 기능만 할 뿐 문자의 개수를 세지는 않는다. 개수는 len() 함수를 쓴다."}, {"id": 117, "type": "mcq", "q": "텍스트 파일을 다루기 위한 파이썬 파일 입출력 명령에서 open(\"data.txt\", \"w\")의 의미로 알맞은 것은?", "code": null, "options": ["data.txt 파일을 읽기 전용으로 연다.", "data.txt 파일이 없으면 오류를 발생시킨다.", "data.txt 파일의 원래 내용을 지우고 새로운 내용으로 덮어쓰기 위해 연다.", "data.txt 파일의 끝에 새로운 데이터를 추가하기 위해 연다.", "data.txt 파일을 완전히 삭제(제거)한다."], "answer": 2, "exp": "\"w\"(쓰기) 모드는 지정된 파일이 있으면 원래 내용을 전부 지우고 완전히 새로운 내용으로 덮어쓴다. 추가하려면 \"a\"(추가하기) 모드를 써야 한다."}, {"id": 118, "type": "mcq", "q": "다음 2차원 리스트 score에서 원소 85를 출력하기 위한 올바른 코드는?", "code": "score = [[90, 75, 80], [70, 85, 95], [88, 92, 77]]", "options": ["print(score[1][1])", "print(score[2][1])", "print(score[1][2])", "print(score[0][1])", "print(score[2][2])"], "answer": 0, "exp": "행(세로)과 열(가로) 인덱스 모두 0부터 시작한다. 85가 들어있는 묶음은 인덱스 1(두 번째 행)에 있고, 그중 85는 인덱스 1(두 번째 열)에 있으므로 score[1][1]이다."}, {"id": 119, "type": "mcq", "q": "다음 파이썬 프로그램의 실행 결과로 옳은 것은?", "code": "num = 15\nif num % 2 == 0 :\n    print(\"짝수\")\nelif num % 3 == 0 :\n    print(\"3의 배수\")\nelse :\n    print(\"기타\")", "options": ["짝수", "3의 배수", "기타", "짝수, 3의 배수", "오류 발생"], "answer": 1, "exp": "num이 15이다. 첫 조건 15%2==0은 거짓이다. 다음 elif 조건 15%3==0은 나머지가 0이므로 참이다. \"3의 배수\"를 출력하고 종료한다."}, {"id": 120, "type": "mcq", "q": "파이썬의 for 반복문에서 range(10, 0, -3)가 생성하는 숫자를 차례대로 바르게 나열한 것은?", "code": null, "options": ["10, 7, 4, 1", "10, 7, 4", "0, 3, 6, 9", "10, 9, 8, 7", "10, -3, 0"], "answer": 0, "exp": "range(시작값, 종룟값, 증감값). 시작 10부터 3씩 감소하며 종룟값(0) 이전(1)까지만 생성된다. 즉 10, 7, 4, 1이다."}, {"id": 121, "type": "mcq", "q": "다음 파이썬 코드의 실행 결과는 무엇인가?", "code": "total = 0\nfor i in range(1, 6) :\n    if i == 4 :\n        break\n    total += i\nprint(total)", "options": ["15", "11", "10", "6", "4"], "answer": 3, "exp": "i가 1, 2, 3일 때는 total에 더해져 6이 된다. i가 4가 되면 조건이 참이 되어 break문을 만나 반복문을 즉시 빠져나온다. 따라서 결과는 6."}, {"id": 122, "type": "mcq", "q": "반복문 내부에서 조건문과 함께 쓰여, 특정 조건을 만족할 때 이후의 명령문을 건너뛰고 바로 다음 반복(루프)의 처음으로 돌아가게 만드는 명령어는?", "code": null, "options": ["pass", "break", "continue", "return", "stop"], "answer": 2, "exp": "현재 반복 회차의 남은 아래 코드를 무시(건너뜀)하고 다음 반복의 시작점으로 돌아가는 명령어는 continue이다."}, {"id": 123, "type": "mcq", "q": "다음 중 파이썬 내장 함수(기본 함수)가 아닌 것은? (외부 모듈을 import 해야 하는 것은?)", "code": null, "options": ["print()", "sum()", "len()", "math.ceil()", "input()"], "answer": 3, "exp": "print, sum, len, input 등은 파이썬 기본 내장 함수이나 math.ceil은 math라는 표준 모듈(라이브러리)을 import 해야만 쓸 수 있는 외장 함수이다."}, {"id": 124, "type": "mcq", "q": "사용자 정의 함수에 대한 설명으로 옳은 것만을 <보기>에서 모두 고른 것은?\nㄱ. 함수를 만들 때는 def 키워드를 사용한다.\nㄴ. 함수 내부에서 결과값을 반환할 때는 return 명령어를 사용한다.\nㄷ. 함수에서 사용되는 매개 변수와 반환값은 반드시 1개 이상 존재해야 한다.\nㄹ. 함수 내부에서 선언된 지역 변수는 프로그램이 끝날 때까지 어디서든 사용할 수 있다.", "code": null, "options": ["ㄱ, ㄴ", "ㄴ, ㄷ", "ㄱ, ㄹ", "ㄱ, ㄴ, ㄷ", "ㄴ, ㄷ, ㄹ"], "answer": 0, "exp": "함수에 매개 변수나 return 반환값은 없을 수도 있다(필수 아님). 지역 변수는 함수 내부에서 선언되며, 해당 함수가 끝나면 메모리에서 즉시 삭제된다."}, {"id": 125, "type": "mcq", "q": "파이썬에서 표 형태의 대용량 데이터를 처리하고 통계를 내는 데 가장 특화된 외부 라이브러리는 무엇인가?", "code": null, "options": ["random", "matplotlib", "pandas", "time", "os"], "answer": 2, "exp": "행과 열로 이루어진 2차원 표(Table) 형태의 데이터셋을 읽어 들이고 조작 및 분석하는 데 뛰어난 파이썬 외부 라이브러리는 pandas이다."}, {"id": 126, "type": "mcq", "q": "객체지향 프로그래밍에 대한 설명으로 옳지 않은 것은?", "code": null, "options": ["클래스는 객체를 만들기 위한 공통된 속성과 기능을 정의한 설계도이다.", "객체는 상태를 나타내는 속성(변수)과 동작을 나타내는 메소드(함수)로 이루어진다.", "하나의 클래스를 사용하여 무한히 많은 여러 개의 인스턴스를 생성할 수 있다.", "클래스 내부의 메소드는 첫 번째 매개 변수로 자기 자신을 의미하는 self를 반드시 받아야 한다.", "인스턴스를 생성할 때는 def 키워드를 사용하여 변수처럼 선언한다."], "answer": 4, "exp": "인스턴스를 생성할 때는 클래스 이름을 함수처럼 호출하여 만든다(예: a = Person()). def는 함수(메소드)를 정의할 때 쓰는 키워드이다."}, {"id": 127, "type": "mcq", "q": "객체지향 프로그래밍에서 클래스를 기반으로 메모리에 생성되어 실제로 사용되는 개별 객체를 무엇이라 부르는가?", "code": null, "options": ["모듈 (Module)", "메소드 (Method)", "라이브러리 (Library)", "인스턴스 (Instance)", "패키지 (Package)"], "answer": 3, "exp": "클래스라는 설계도(틀)를 바탕으로 실제 사용할 수 있도록 찍어낸 개별 객체를 인스턴스(Instance)라고 한다."}, {"id": 128, "type": "mcq", "q": "인공지능이 적용된 '지능 에이전트'가 기존의 '일반 에이전트'와 구별되는 가장 큰 차이점은 무엇인가?", "code": null, "options": ["프로그래머가 미리 설정한 고정된 규칙에 따라서만 정확하게 행동한다.", "센서가 없이 오직 소프트웨어 내부에서만 작동한다.", "주변 환경을 인식하고 스스로 학습과 추론을 거쳐 판단하여 자율적으로 행동한다.", "하나의 단일 목적만을 위해 오프라인 환경에서만 구동된다.", "인간의 감정을 100% 동일하게 모방하여 윤리적 판단까지 완벽히 수행한다."], "answer": 2, "exp": "일반 에이전트는 정해진 규칙대로만 움직이지만, 지능 에이전트는 기계학습/추론을 통해 환경 변화에 맞춰 판단을 스스로 조정하고 자율적으로 대응한다."}, {"id": 129, "type": "mcq", "q": "다음 중 지능 에이전트의 4가지 주요 특성에 해당하지 않는 것은?", "code": null, "options": ["자율성", "목적성", "적응성", "사회성", "수동성"], "answer": 4, "exp": "지능 에이전트의 4대 특성은 스스로 행동하는 '자율성', 목적을 달성하려는 '목적성', 환경에 맞춰 변하는 '적응성', 상호 작용하는 '사회성'이다."}, {"id": 130, "type": "mcq", "q": "인공지능, 기계학습, 딥러닝의 관계를 나타낼 때, 가장 좁은 의미의 개념부터 가장 넓은 의미의 개념 순으로 바르게 나열한 것은?", "code": null, "options": ["인공지능 → 기계학습 → 딥러닝", "기계학습 → 딥러닝 → 인공지능", "딥러닝 → 기계학습 → 인공지능", "딥러닝 → 인공지능 → 기계학습", "기계학습 → 인공지능 → 딥러닝"], "answer": 2, "exp": "인간의 지능을 모방하는 큰 범주가 인공지능(AI)이며, 스스로 데이터를 규칙화하는 것이 기계학습(ML), 그중에서도 인간의 인공 신경망 구조를 모방한 가장 깊고 세부적인 기술이 딥러닝(DL)이다."}, {"id": 131, "type": "mcq", "q": "기계학습의 유형 중, 컴퓨터에게 입력 데이터와 함께 미리 분류된 '정답(레이블)'을 주어 학습시킨 후 새로운 데이터의 결과를 예측하게 하는 방법은?", "code": null, "options": ["비지도학습", "강화학습", "전이학습", "지도학습", "군집화"], "answer": 3, "exp": "문제와 그에 대한 '정답(레이블)' 데이터셋을 함께 제공하여 패턴을 익히게 하는 기계학습 방식은 '지도학습'이다."}, {"id": 132, "type": "mcq", "q": "기계학습의 비지도학습 모델 중 하나로, 정답이 없는 데이터들의 특성을 분석하여 성향이 비슷한 데이터끼리 그룹으로 묶는 기법은 무엇인가?", "code": null, "options": ["선형 회귀", "군집화 (Clustering)", "의사결정트리", "인공 신경망", "로지스틱 회귀"], "answer": 1, "exp": "정답 레이블이 없는 데이터들 속에서 비슷한 특성과 성향을 가진 것들끼리 소그룹으로 묶어내는 비지도학습 기법을 '군집화(Clustering)'라고 한다."}, {"id": 133, "type": "mcq", "q": "빅데이터와 인공지능을 활용하여 다양한 사회적/학문적 문제를 해결하는 '탐색적 데이터 분석' 4단계의 순서로 알맞은 것은?", "code": null, "options": ["문제 정의하기 → 데이터 수집하기 → 데이터 분석하기 → 문제 해결하기", "데이터 수집하기 → 데이터 분석하기 → 문제 정의하기 → 문제 해결하기", "문제 해결하기 → 문제 정의하기 → 데이터 수집하기 → 데이터 분석하기", "데이터 수집하기 → 문제 정의하기 → 데이터 분석하기 → 문제 해결하기", "문제 정의하기 → 데이터 분석하기 → 데이터 수집하기 → 문제 해결하기"], "answer": 0, "exp": "문제를 명확히 파악하는 [문제 정의하기] → 필요한 자료를 모으는 [데이터 수집하기] → [데이터 분석하기] → [문제 해결하기(공유/평가)] 순이다."}, {"id": 134, "type": "mcq", "q": "파이썬 코드 print(math.floor(5.8))의 실행 결과로 올바른 것은? (단, import math는 실행됨)", "code": null, "options": ["6", "5.8", "5", "0", "오류 발생"], "answer": 2, "exp": "math.floor() 함수는 주어진 숫자의 소수점 이하를 무조건 '내림'하여 가장 가까운 작은 정수를 반환하므로 5가 출력된다. (math.ceil은 올림, round는 반올림)"}, {"id": 135, "type": "mcq", "q": "데이터 목록 [10, 20, 30, 40, 50, 60, 70]에서 '이진 탐색'으로 20을 찾으려 한다. 첫 번째 탐색에서 선택되는 중앙값과, 그 결과 좁혀지는 다음 탐색 범위를 바르게 짝지은 것은?", "code": null, "options": ["중앙값 30, 다음 탐색 범위 [10, 20]", "중앙값 40, 다음 탐색 범위 [50, 60, 70]", "중앙값 40, 다음 탐색 범위 [10, 20, 30]", "중앙값 50, 다음 탐색 범위 [10, 20, 30, 40]", "중앙값 30, 다음 탐색 범위 [40, 50, 60, 70]"], "answer": 2, "exp": "데이터 7개 중앙(인덱스 3)의 중앙값은 40이다. 찾는 값 20이 중앙값 40보다 작으므로 40을 포함한 우측 절반을 버리고, 중앙값의 좌측인 [10, 20, 30]을 새로운 탐색 범위로 지정한다."}, {"id": 136, "type": "short", "q": "디지털 이미지 압축 방식인 '비손실 압축'과 '손실 압축'의 차이점을 '용량'과 '압축 해제 후 원본 복원 여부'를 포함하여 2줄 이내로 서술하시오.", "code": null, "answer": "비손실 압축은 용량 감소율은 적지만 압축 해제 시 원본 데이터와 100% 동일하게 복원되며, 손실 압축은 원본과 똑같이 복원되지 않지만(약간의 정보 손실 발생) 용량을 획기적으로 줄일 수 있다."}, {"id": 137, "type": "short", "q": "패스워드 암호화에 주로 사용되는 '해시 함수'가 지니는 단방향 암호화의 특성이란 무엇을 의미하는지 간략히 서술하시오.", "code": null, "answer": "데이터를 암호화하여 해시값으로 변환할 수는 있지만, 생성된 해시값을 역계산하여 원래의 평문(원본)으로 알아내는 복호화는 불가능하다는 것을 의미한다."}, {"id": 138, "type": "short", "q": "빅데이터가 가지는 5가지 핵심 특징(5V) 중 3가지의 명칭(한국어 또는 영어)을 적으시오.", "code": null, "answer": "규모(Volume), 속도(Velocity), 다양성(Variety), 정확성(Veracity), 가치(Value) 중 택 3"}, {"id": 139, "type": "short", "q": "탐색 알고리즘 중 '이진 탐색(Binary Search)'이 정상적으로 작동하기 위해 탐색을 시작하기 전 데이터 배열이 반드시 갖추고 있어야 할 상태적 조건은 무엇인지 쓰시오.", "code": null, "answer": "데이터가 크기 순서대로 '오름차순' 또는 '내림차순'으로 미리 정렬되어 있어야 한다."}, {"id": 140, "type": "short", "q": "파이썬에서 input().split() 명령어를 사용했을 때 split() 메서드가 수행하는 역할을 띄어쓰기(공백)와 관련지어 서술하시오.", "code": null, "answer": "키보드로 한 줄에 입력받은 문자열을 띄어쓰기(공백)를 기준으로 나누어 분리한 뒤, 여러 개의 항목으로 나누어 리스트 형태로 저장한다."}, {"id": 141, "type": "short", "q": "변수 a = [10, 20, 30]으로 선언된 1차원 리스트의 맨 마지막에 정수 40을 추가하기 위해 사용하는 파이썬 명령어(함수)와 코드를 완전한 한 줄로 쓰시오.", "code": null, "answer": "a.append(40)"}, {"id": 142, "type": "short", "q": "파이썬 for 반복문에서 range(5, 0, -1) 코드를 실행할 때 반복해서 생성되는 정수들을 순서대로 모두 나열하시오.", "code": null, "answer": "5, 4, 3, 2, 1 (시작값 5부터 1씩 감소하며, 종룟값 0 이전인 1까지만 생성됨)"}, {"id": 143, "type": "short", "q": "반복문을 제어하는 명령어인 break문과 continue문의 기능적 차이점을 서술하시오.", "code": null, "answer": "break문은 현재 실행 중인 반복문을 완전히 강제로 종료하고 빠져나오지만, continue문은 반복을 종료하지 않고 아래 코드를 건너뛴 뒤 다음 반복 회차를 계속 이어서 실행하게 한다."}, {"id": 144, "type": "short", "q": "파이썬에서 변수의 사용 범위에 따른 종류 중, '사용자 정의 함수 내부에서 선언되어 해당 함수 안에서만 사용될 수 있는 변수'를 무엇이라고 부르는지 쓰시오.", "code": null, "answer": "지역 변수 (Local Variable)"}, {"id": 145, "type": "short", "q": "객체지향 프로그래밍에서 클래스로부터 생성된 실체인 '인스턴스(Instance)'가 생성될 때마다 속성값을 초기화하기 위해 자동으로 호출되는 특수한 생성자 메소드의 이름은 무엇인지 쓰시오.", "code": null, "answer": "__init__ (또는 __init__())"}, {"id": 146, "type": "short", "q": "데이터 시각화, 특히 다양한 차트나 그래프를 그리기 위해 가장 널리 사용되는 파이썬의 외부 라이브러리 이름을 쓰시오.", "code": null, "answer": "matplotlib (맷플롯립)"}, {"id": 147, "type": "short", "q": "지능 에이전트의 4가지 주요 특성 중 2가지만 쓰시오.", "code": null, "answer": "자율성, 목적성, 적응성, 사회성 중 택 2"}, {"id": 148, "type": "short", "q": "기계학습의 3가지 유형(지도학습, 비지도학습, 강화학습) 중, 컴퓨터에게 입력 데이터와 함께 미리 분류된 '정답(레이블)'을 알려주면서 패턴을 학습하게 하는 유형은 무엇인지 쓰시오.", "code": null, "answer": "지도학습"}, {"id": 149, "type": "short", "q": "빅데이터 분석 시 거치는 [데이터 전처리] 단계에서, 수집되지 않아 누락되어 비어있는 데이터 값을 지칭하는 용어를 쓰시오.", "code": null, "answer": "결측치"}, {"id": 150, "type": "short", "q": "알고리즘을 설계하는 3가지 기본 제어 구조(순차, 선택, 반복) 중 주어진 조건의 참, 거짓 여부에 따라 프로그램의 실행 경로를 분기시키는 구조의 명칭을 쓰시오.", "code": null, "answer": "선택 구조 (조건문)"}, {"id": 151, "type": "mcq", "q": "디지털 데이터 압축 기술 중, 데이터를 압축할 때 손실 압축과 비손실 압축으로 나뉘는 가장 핵심적인 기준은 무엇인가?", "code": null, "options": ["압축에 걸리는 시간", "압축 후 파일의 색상 수", "압축 해제(복원) 후 원본 데이터와 100% 일치하는지 여부", "압축 프로그램의 제조사", "파일의 확장자명"], "answer": 2, "exp": "압축 해제(복원) 후 원본과 완전히 동일하면 비손실 압축, 일부 정보가 삭제되어 원본과 다르면 손실 압축으로 구분한다."}, {"id": 152, "type": "mcq", "q": "다음 중 소리(오디오) 데이터의 파일 형식과 압축 방식이 잘못 짝지어진 것은?", "code": null, "options": ["WAV - 무압축", "FLAC - 비손실 압축", "MP3 - 손실 압축", "AAC - 손실 압축", "PNG - 비손실 압축(소리 파일)"], "answer": 4, "exp": "PNG는 소리(오디오) 파일 형식이 아니라 이미지 압축 파일 형식이다."}, {"id": 153, "type": "mcq", "q": "공개키 암호화 방식에서, A가 B에게 비밀 메시지를 안전하게 보내고자 할 때 A가 메시지를 암호화하는 데 사용해야 하는 키는?", "code": null, "options": ["A의 개인키", "A의 공개키", "B의 개인키", "B의 공개키", "A와 B가 사전에 공유한 대칭키"], "answer": 3, "exp": "공개키 암호화에서 송신자(A)는 반드시 수신자(B)의 '공개키'로 암호화해야 하며, 수신자(B)만이 자신의 개인키로 복호화하여 내용을 확인할 수 있다."}, {"id": 154, "type": "mcq", "q": "해시 함수(Hash Function)의 특징에 대한 설명으로 옳지 않은 것은?", "code": null, "options": ["입력값이 동일하면 항상 같은 길이의 동일한 출력값(해시값)을 반환한다.", "해시값을 다시 역산하여 원래의 입력값(평문)을 알아낼 수 없다.", "비밀번호 저장 등 단방향 암호화가 필요한 분야에 주로 활용된다.", "입력 데이터의 길이와 상관없이 항상 정해진 고정 길이의 결괏값을 출력한다.", "암호화와 복호화 모두가 가능한 대표적인 양방향 암호화 기술이다."], "answer": 4, "exp": "해시 함수는 복호화(역산)가 불가능한 대표적인 '단방향' 암호화 기술이다. 양방향(대칭키, 공개키 등)과 명확히 구분된다."}, {"id": 155, "type": "mcq", "q": "빅데이터의 5V 특성 중, 다양한 형태(텍스트, 이미지, 영상 등)의 데이터가 존재함을 의미하는 특징은 무엇인가?", "code": null, "options": ["Volume (규모)", "Velocity (속도)", "Variety (다양성)", "Veracity (정확성)", "Value (가치)"], "answer": 2, "exp": "정형 데이터뿐만 아니라 사진, 영상, 음성 등 비정형 데이터까지 다양한 형태로 존재함을 뜻하는 특징은 'Variety(다양성)'이다."}, {"id": 156, "type": "mcq", "q": "빅데이터 분석 과정에서 '데이터 전처리'를 수행하는 목적으로 가장 적절한 것은?", "code": null, "options": ["수집한 원본 데이터를 모두 삭제하기 위해서", "분석에 방해가 되는 결측치, 이상치, 중복값을 정리하여 데이터 품질을 높이기 위해서", "데이터를 암호화하여 외부에 유출되지 않도록 막기 위해서", "데이터를 그래프나 표로 바꾸어 시각적으로 표현하기 위해서", "문제를 새롭게 정의하고 가설을 세우기 위해서"], "answer": 1, "exp": "데이터 전처리는 결측치, 이상치, 중복값 등 분석을 방해하는 요소를 정리하여 데이터의 신뢰성과 품질을 높이는 과정이다."}, {"id": 157, "type": "mcq", "q": "문제 해결을 위한 추상화 과정에서 '핵심 요소 추출' 단계에 대한 설명으로 가장 알맞은 것은?", "code": null, "options": ["문제를 더 작은 단위의 하위 문제로 쪼개는 단계이다.", "문제 해결에 꼭 필요한 정보만 남기고 불필요한 요소는 제거하는 단계이다.", "알고리즘을 의사 코드나 순서도로 표현하는 단계이다.", "완성된 프로그램을 실제로 실행하고 오류를 점검하는 단계이다.", "문제의 현재 상태와 목표 상태를 비교 분석하는 단계이다."], "answer": 1, "exp": "핵심 요소 추출은 문제 해결에 직접적으로 필요한 정보만 선별하고, 불필요하거나 부차적인 요소는 과감히 제거하는 추상화의 세부 단계이다."}, {"id": 158, "type": "mcq", "q": "모델링 방식 중 '트리(Tree)' 구조에 대한 설명으로 옳은 것은?", "code": null, "options": ["모든 노드가 서로 자유롭게 연결되어 순환 구조(사이클)를 가질 수 있다.", "행과 열로 구성된 2차원 표 형태로 데이터를 나타낸다.", "루트 노드를 정점으로 하여 하위 노드로 뻗어 나가는 계층적 구조를 가진다.", "오직 두 개의 데이터만 서로 연결할 수 있는 가장 단순한 구조이다.", "데이터 간의 순서가 전혀 존재하지 않는 비선형 구조이다."], "answer": 2, "exp": "트리 구조는 가장 위의 루트(뿌리) 노드에서부터 시작하여 자식 노드로 가지를 뻗어나가는 계층적(상하 관계) 구조를 가진다."}, {"id": 159, "type": "mcq", "q": "좋은 알고리즘이 갖추어야 할 효율성의 조건 두 가지로 가장 알맞은 것은?", "code": null, "options": ["코드의 길이와 변수의 개수", "수행 시간과 기억 장소(메모리) 사용량", "프로그래밍 언어의 종류와 실행 환경", "개발자의 수와 개발 기간", "화면의 해상도와 색상 수"], "answer": 1, "exp": "효율적인 알고리즘은 일반적으로 프로그램의 '수행 시간'이 짧고 '기억 장소(메모리)'를 적게 사용해야 한다."}, {"id": 160, "type": "mcq", "q": "순서도(Flowchart)에서 데이터의 입력이나 출력을 나타낼 때 사용하는 기호의 모양은?", "code": null, "options": ["타원형", "마름모", "평행사변형", "직사각형", "화살표"], "answer": 2, "exp": "순서도에서 데이터의 입력과 출력을 나타내는 기호는 평행사변형이다. (타원형은 시작/끝, 마름모는 판단, 직사각형은 처리 과정을 의미)"}, {"id": 161, "type": "mcq", "q": "버블 정렬(Bubble Sort)과 선택 정렬(Selection Sort)의 공통점으로 옳은 것은?", "code": null, "options": ["둘 다 데이터가 미리 정렬되어 있어야만 사용할 수 있다.", "둘 다 탐색 범위를 절반씩 줄여나가며 탐색한다.", "둘 다 인접한 데이터끼리만 비교하여 교환한다.", "둘 다 정렬되지 않은 데이터를 작은 값부터 차례로 나열하는 정렬 알고리즘이다.", "둘 다 데이터를 암호화하여 정렬한다."], "answer": 3, "exp": "버블 정렬과 선택 정렬은 비교 방식은 다르지만, 둘 다 정렬되지 않은 데이터를 비교를 통해 오름차순(또는 내림차순)으로 나열하는 정렬 알고리즘이라는 공통점이 있다."}, {"id": 162, "type": "mcq", "q": "이진 탐색(Binary Search) 알고리즘의 시간적 효율성에 대한 설명으로 가장 적절한 것은?", "code": null, "options": ["데이터의 개수와 상관없이 항상 일정한 속도로 탐색한다.", "순차 탐색에 비해 일반적으로 대용량 데이터에서 훨씬 빠르게 탐색할 수 있다.", "데이터가 적을 때만 사용 가능하며, 데이터가 많아지면 사용할 수 없다.", "탐색할 때마다 전체 데이터를 모두 확인해야 하므로 순차 탐색보다 느리다.", "데이터가 정렬되어 있지 않아도 빠른 속도를 유지한다."], "answer": 1, "exp": "이진 탐색은 비교할 때마다 탐색 범위가 절반씩 줄어들기 때문에, 데이터의 양이 많을수록 순차 탐색보다 압도적으로 빠른 속도를 보인다."}, {"id": 163, "type": "mcq", "q": "파이썬 변수명 작성 시 가능한 것은 무엇인가?", "code": null, "options": ["class (예약어)", "2024_score", "_score2024", "my score", "한.글변수"], "answer": 2, "exp": "_score2024는 밑줄로 시작하고 숫자로 시작하지 않으므로 올바른 변수명이다. 예약어, 숫자로 시작, 공백, 특수문자(.)는 사용할 수 없다."}, {"id": 164, "type": "mcq", "q": "파이썬 print(7 // 2, 7 % 2) 코드의 실행 결과로 올바른 것은?", "code": null, "options": ["3 1", "3.5 1", "3 0", "4 1", "3 1.5"], "answer": 0, "exp": "7 // 2는 몫을 구하므로 3, 7 % 2는 나머지를 구하므로 1이다. 따라서 출력 결과는 3 1이다."}, {"id": 165, "type": "mcq", "q": "파이썬에서 키보드로 숫자 데이터를 입력받아 바로 산술 연산에 사용하기 위한 코드로 가장 알맞은 것은?", "code": null, "options": ["a = input(\"숫자 입력: \")", "a = str(input(\"숫자 입력: \"))", "a = int(input(\"숫자 입력: \"))", "a = print(input(\"숫자 입력: \"))", "a = input + 1"], "answer": 2, "exp": "input()은 기본적으로 문자열을 반환하므로, 산술 연산을 하려면 int()나 float()로 형 변환을 해야 한다."}, {"id": 166, "type": "mcq", "q": "리스트 a = [5, 3, 8, 1, 9]에서 가장 큰 값을 찾아 출력하는 코드로 알맞은 것은?", "code": null, "options": ["print(a.sort())", "print(min(a))", "print(max(a))", "print(a.len())", "print(a.index())"], "answer": 2, "exp": "리스트에서 가장 큰 값을 찾아주는 파이썬 내장 함수는 max()이다. 가장 작은 값은 min()으로 찾는다."}, {"id": 167, "type": "mcq", "q": "2차원 리스트 board = [[1,2],[3,4]]에서 board[1][0]이 가리키는 값은 무엇인가?", "code": null, "options": ["1", "2", "3", "4", "오류 발생"], "answer": 2, "exp": "인덱스는 0부터 시작한다. board[1]은 두 번째 행([3,4])을 의미하고, 그중 [0]은 첫 번째 값인 3을 의미한다."}, {"id": 168, "type": "mcq", "q": "다음 파이썬 코드의 실행 결과로 알맞은 것은?", "code": "x = 7\nif x > 10 :\n    print(\"A\")\nelif x > 5 :\n    print(\"B\")\nelif x > 0 :\n    print(\"C\")\nelse :\n    print(\"D\")", "options": ["A", "B", "C", "D", "B, C"], "answer": 1, "exp": "x가 7이다. x>10은 거짓, x>5는 참이므로 \"B\"를 출력하고 나머지 elif와 else는 검사하지 않고 종료한다."}, {"id": 169, "type": "mcq", "q": "파이썬 for i in range(2, 11, 3): 문이 반복되면서 변수 i에 대입되는 값들을 순서대로 바르게 나열한 것은?", "code": null, "options": ["2, 5, 8", "2, 5, 8, 11", "2, 4, 6, 8, 10", "3, 6, 9", "2, 11, 3"], "answer": 0, "exp": "2부터 시작하여 3씩 증가하며, 종룟값인 11 미만까지만 생성되므로 2, 5, 8이다."}, {"id": 170, "type": "mcq", "q": "다음 코드의 실행 결과로 알맞은 것은?", "code": "cnt = 0\nfor i in range(1, 10) :\n    if i % 3 != 0 :\n        continue\n    cnt += 1\nprint(cnt)", "options": ["2", "3", "6", "9", "0"], "answer": 1, "exp": "i가 1부터 9까지 반복되는 동안, i % 3이 0이 아닐 때(3의 배수가 아닐 때) continue로 건너뛴다. 3의 배수인 3, 6, 9일 때만 cnt가 1씩 증가하므로 결과는 3이다."}, {"id": 171, "type": "mcq", "q": "random 모듈을 사용하여 리스트 안의 데이터 중 하나를 무작위로 골라 반환하는 함수는 무엇인가?", "code": "import random\nfruit = [\"사과\", \"바나나\", \"포도\"]", "options": ["random.randint(fruit)", "random.choice(fruit)", "random.sample(fruit)", "random.shuffle(fruit)", "random.seed(fruit)"], "answer": 1, "exp": "리스트(시퀀스) 안에서 무작위로 한 개의 요소를 골라 반환하는 함수는 random.choice()이다."}, {"id": 172, "type": "mcq", "q": "다음 중 사용자 정의 함수와 관련된 설명으로 옳지 않은 것은?", "code": null, "options": ["def 키워드 뒤에 함수의 이름과 매개변수를 작성한다.", "함수는 매개변수가 없어도 정의하고 호출할 수 있다.", "return문이 없는 함수는 호출해도 아무런 값도 반환하지 않을 수 있다.", "함수 내부에서 선언한 변수는 함수 밖에서도 자유롭게 사용 가능하다.", "같은 함수를 여러 번 반복 호출하여 코드의 중복을 줄일 수 있다."], "answer": 3, "exp": "함수 내부에서 선언된 변수(지역 변수)는 그 함수 안에서만 사용 가능하며 함수가 끝나면 사라지므로, 함수 밖에서는 사용할 수 없다."}, {"id": 173, "type": "mcq", "q": "전역 변수 count = 0이 선언되어 있을 때, 함수 내부에서 이 값을 1 증가시켜 변경하고자 한다. 빈칸에 들어갈 알맞은 키워드는 무엇인가?\ndef add_one():\n    ___ count\n    count += 1", "code": null, "options": ["local", "static", "global", "public", "return"], "answer": 2, "exp": "함수 내부에서 외부의 전역 변수 값을 직접 변경하려면 반드시 global 키워드를 먼저 선언해야 한다."}, {"id": 174, "type": "mcq", "q": "파이썬 외부 라이브러리 중 복잡한 수학 함수(삼각함수, 로그함수 등)와 수치 배열(다차원 배열) 연산에 특화된 라이브러리는?", "code": null, "options": ["pandas", "matplotlib", "numpy", "random", "time"], "answer": 2, "exp": "대규모 다차원 배열과 행렬 연산, 다양한 수학 함수를 빠르게 처리하는 데 특화된 파이썬 외부 라이브러리는 numpy이다."}, {"id": 175, "type": "mcq", "q": "객체지향 프로그래밍의 클래스(Class)에 대한 설명으로 옳지 않은 것은?", "code": null, "options": ["객체(인스턴스)를 만들어내기 위한 설계도 역할을 한다.", "class 키워드를 사용하여 정의한다.", "하나의 클래스로부터 여러 개의 인스턴스를 만들 수 있다.", "클래스 내부에는 속성(변수)과 메소드(함수)를 정의할 수 있다.", "클래스는 한 번 정의하면 절대로 다른 변수와 함수를 추가할 수 없다."], "answer": 4, "exp": "클래스는 일반적인 파이썬 코드 블록처럼 자유롭게 속성과 메소드를 추가하거나 수정하며 설계할 수 있다."}, {"id": 176, "type": "mcq", "q": "클래스 내부에 정의된 함수를 부르는 명칭과, 인스턴스 자신을 가리키기 위해 사용하는 첫 번째 매개변수를 순서대로 바르게 짝지은 것은?", "code": null, "options": ["함수 - this", "메소드 - self", "모듈 - self", "함수 - self", "메소드 - this"], "answer": 1, "exp": "클래스 내부에 정의된 함수는 '메소드'라고 부르며, 그 메소드의 첫 번째 매개변수로 인스턴스 자기 자신을 가리키는 self를 사용한다."}, {"id": 177, "type": "mcq", "q": "지능 에이전트가 가진 특성 중, 외부의 직접적인 개입 없이도 스스로 판단하고 행동하는 특성을 가리키는 용어는?", "code": null, "options": ["사회성", "적응성", "목적성", "자율성", "수동성"], "answer": 3, "exp": "사람의 직접적인 지속적 개입 없이 스스로 판단하여 행동하는 지능 에이전트의 특성은 '자율성'이다."}, {"id": 178, "type": "mcq", "q": "기계학습의 한 종류로, 에이전트가 특정 행동을 했을 때 환경으로부터 '보상' 또는 '벌'을 받으며 시행착오를 통해 최적의 행동 방식을 스스로 학습해 나가는 방식은?", "code": null, "options": ["지도학습", "비지도학습", "강화학습", "전이학습", "군집학습"], "answer": 2, "exp": "행동에 대한 보상(또는 벌)을 받으며 시행착오를 거쳐 최적의 전략을 스스로 학습하는 기계학습 방식은 '강화학습'이다."}, {"id": 179, "type": "mcq", "q": "파이썬 2차원 리스트 arr = [[4, 5, 6], [7, 8, 9], [10, 11, 12]]에서 숫자 6에 접근하기 위한 올바른 인덱스는?", "code": null, "options": ["arr[0][1]", "arr[1][2]", "arr[0][2]", "arr[2][0]", "arr[1][0]"], "answer": 2, "exp": "인덱스는 0부터 시작한다. 6은 첫 번째 행(인덱스 0)의 세 번째 위치(인덱스 2)이므로 arr[0][2]이다."}, {"id": 180, "type": "mcq", "q": "생성형 AI(Generative AI)의 활용 사례로 가장 적절하지 않은 것은?", "code": null, "options": ["텍스트 프롬프트를 입력하여 새로운 이미지를 그려내는 것", "사용자의 질문에 대해 새로운 문장을 생성하여 답변하는 챗봇", "대량의 코드를 학습하여 새로운 프로그램 코드를 작성해 주는 것", "미리 저장된 정적인 웹페이지 정보를 그대로 사용자에게 보여만 주는 것", "기존 노래를 학습하여 새로운 스타일의 음악을 작곡하는 것"], "answer": 3, "exp": "생성형 AI는 학습을 통해 '새로운' 콘텐츠를 만들어내는 것이 핵심이다. 저장된 정적 정보를 그대로 보여주기만 하는 것은 생성(Generative)의 사례로 볼 수 없다."}, {"id": 181, "type": "mcq", "q": "빅데이터, 인공지능 등 정보 기술을 활용하여 사회 문제를 해결하는 과정에서 가장 먼저 이루어져야 하는 단계는 무엇인가?", "code": null, "options": ["데이터 시각화하기", "문제 정의하기", "데이터 수집하기", "알고리즘 설계하기", "프로그램 실행하기"], "answer": 1, "exp": "탐색적 데이터 분석 과정에서 가장 먼저 해결하고자 하는 문제가 무엇인지 명확히 하는 '문제 정의하기' 단계가 선행되어야 한다."}, {"id": 182, "type": "mcq", "q": "다음 <보기>의 설명에 해당하는 인공지능 기술 용어로 알맞은 것은?\n<보기> 사람의 신경 세포(뉴런)가 연결된 모습을 본떠 여러 개의 층(Layer)을 깊게 쌓아 입력된 데이터의 복잡한 패턴을 스스로 학습하는 기술이다.", "code": null, "options": ["빅데이터", "블록체인", "사물인터넷(IoT)", "딥러닝(Deep Learning)", "클라우드 컴퓨팅"], "answer": 3, "exp": "인간 두뇌의 신경망 구조를 모방해 여러 층을 깊게 쌓아 학습하는 기술은 '딥러닝'이다."}, {"id": 183, "type": "mcq", "q": "문제 해결을 위한 알고리즘을 표현하는 방법인 '순서도(Flowchart)'와 '의사 코드(Pseudocode)'의 공통적인 목적으로 가장 알맞은 것은?", "code": null, "options": ["컴퓨터가 직접 실행할 수 있는 기계어로 변환하기 위해서", "특정 프로그래밍 언어 없이도 알고리즘의 논리적 흐름을 사람이 이해하기 쉽게 표현하기 위해서", "데이터를 안전하게 암호화하여 저장하기 위해서", "웹사이트의 디자인을 미리 시각적으로 보여주기 위해서", "컴퓨터의 메모리 사용량을 줄이기 위해서"], "answer": 1, "exp": "순서도와 의사 코드는 모두 실제 프로그래밍 언어의 문법에 얽매이지 않고, 알고리즘의 논리적인 흐름을 사람이 쉽게 이해하도록 표현하는 도구이다."}, {"id": 184, "type": "mcq", "q": "정렬 알고리즘인 버블 정렬과 선택 정렬에 대한 설명으로 옳은 것은?", "code": null, "options": ["버블 정렬은 매번 가장 작은 값을 찾아 맨 앞과 교환한다.", "선택 정렬은 인접한 두 데이터를 비교하여 교환을 반복한다.", "버블 정렬은 인접한 두 데이터를 비교하여 교환을 반복한다.", "두 정렬 방식 모두 데이터를 절반씩 나누어 탐색한다.", "두 정렬 방식 모두 정렬 전 데이터가 미리 정렬되어 있어야 한다."], "answer": 2, "exp": "버블 정렬은 인접한 두 데이터를 비교하여 교환하는 방식이며, 선택 정렬은 전체에서 최솟값(혹은 최댓값)을 찾아 기준 위치와 교환하는 방식이다."}, {"id": 185, "type": "mcq", "q": "다음 중 클래스와 인스턴스의 관계에 대한 비유로 가장 알맞은 것은?", "code": null, "options": ["클래스는 자동차이고, 인스턴스는 도로이다.", "클래스는 붕어빵 틀이고, 인스턴스는 만들어진 붕어빵이다.", "클래스는 변수이고, 인스턴스는 함수이다.", "클래스는 모니터이고, 인스턴스는 키보드이다.", "클래스는 결과이고, 인스턴스는 원인이다."], "answer": 1, "exp": "클래스는 객체를 만들어내는 공통의 틀(설계도)이고, 인스턴스는 그 틀을 통해 실제로 만들어진 개별 산출물이라는 점에서 붕어빵 틀과 붕어빵의 관계로 비유된다."}, {"id": 186, "type": "short", "q": "공개키 암호화 방식이 대칭키 암호화 방식에 비해 가지는 장점을 '키 관리(분배)'의 측면에서 서술하시오.", "code": null, "answer": "대칭키 방식은 통신 상대마다 비밀키를 안전하게 따로 공유해야 하는 번거로움이 있지만, 공개키 방식은 공개키를 누구에게나 공개해도 되므로 키를 분배하고 관리하기가 더 용이하다."}, {"id": 187, "type": "short", "q": "빅데이터의 5V 특성 중 'Volume(규모)'과 'Velocity(속도)'가 각각 의미하는 바를 간략히 서술하시오.", "code": null, "answer": "Volume(규모)은 기존 데이터베이스로 처리하기 힘들 정도로 방대한 데이터의 양을 의미하며, Velocity(속도)는 데이터가 생성되고 수집·처리되는 빠른 속도를 의미한다."}, {"id": 188, "type": "short", "q": "문제 해결을 위한 추상화의 두 단계인 '문제 분해'와 '핵심 요소 추출' 중, 큰 문제를 작은 단위의 하위 문제로 나누는 단계는 무엇인지 쓰시오.", "code": null, "answer": "문제 분해"}, {"id": 189, "type": "short", "q": "모델링 방식인 '트리(Tree) 구조'와 '그래프(Graph) 구조'의 차이를 사이클(순환 구조) 존재 여부로 서술하시오.", "code": null, "answer": "트리 구조는 노드 간에 순환(사이클)이 존재하지 않는 계층적 구조이지만, 그래프 구조는 노드 간 자유로운 연결로 인해 순환(사이클)이 존재할 수 있는 구조이다."}, {"id": 190, "type": "short", "q": "버블 정렬과 선택 정렬 알고리즘의 비교 방식의 차이점을 1줄로 서술하시오.", "code": null, "answer": "버블 정렬은 인접한 두 데이터씩 비교하여 교환하는 방식이고, 선택 정렬은 전체 범위에서 최솟값(또는 최댓값)을 찾아 기준 위치와 교환하는 방식이다."}, {"id": 191, "type": "short", "q": "이진 탐색을 사용하기 전에 데이터가 반드시 갖춰야 할 전제 조건은 무엇인지 쓰시오.", "code": null, "answer": "데이터가 오름차순 또는 내림차순으로 미리 정렬되어 있어야 한다."}, {"id": 192, "type": "short", "q": "input() 함수로 입력받은 데이터의 기본 자료형은 무엇이며, 이를 정수로 변환하기 위해 사용하는 함수는 무엇인지 쓰시오.", "code": null, "answer": "input()으로 입력받은 데이터는 기본적으로 문자열(str) 자료형이며, 이를 정수로 변환하려면 int() 함수를 사용한다."}, {"id": 193, "type": "short", "q": "파이썬 반복문에서 break문과 continue문의 차이를 1줄로 서술하시오.", "code": null, "answer": "break는 반복문 자체를 즉시 종료하지만, continue는 그 회차만 건너뛰고 반복을 계속 이어간다."}, {"id": 194, "type": "short", "q": "함수 내부에서 전역 변수의 값을 변경하기 위해 함수 내부 첫 줄에 작성해야 하는 키워드는 무엇인지 쓰시오.", "code": null, "answer": "global"}, {"id": 195, "type": "short", "q": "객체지향 프로그래밍에서 인스턴스가 생성될 때 자동으로 호출되어 속성을 초기화하는 특수 메소드의 이름을 쓰시오.", "code": null, "answer": "__init__"}, {"id": 196, "type": "short", "q": "지능 에이전트의 4가지 특성 중 '적응성'과 '사회성'이 각각 의미하는 바를 간략히 서술하시오.", "code": null, "answer": "적응성은 변화하는 환경에 맞춰 스스로 행동을 조정하는 능력이며, 사회성은 다른 에이전트나 사람과 상호 작용하고 협력하는 능력을 의미한다."}, {"id": 197, "type": "short", "q": "기계학습의 한 유형으로, 정답(레이블) 없이 데이터들의 특성을 분석해 비슷한 데이터끼리 묶는 '군집화'는 지도학습과 비지도학습 중 어디에 속하는지 쓰시오.", "code": null, "answer": "비지도학습"}, {"id": 198, "type": "short", "q": "인공지능(AI), 기계학습(ML), 딥러닝(DL) 세 개념의 포함 관계를 가장 넓은 개념부터 순서대로 쓰시오.", "code": null, "answer": "인공지능(AI) > 기계학습(ML) > 딥러닝(DL)"}, {"id": 199, "type": "short", "q": "생성형 AI(Generative AI)가 기존의 단순 검색·분류 AI와 구별되는 핵심적인 특징을 1줄로 서술하시오.", "code": null, "answer": "생성형 AI는 기존 데이터를 검색하거나 분류하는 것을 넘어, 학습한 내용을 바탕으로 글·이미지·음악·코드 등 새로운 콘텐츠를 스스로 창작해낸다는 점에서 구별된다."}, {"id": 200, "type": "short", "q": "탐색적 데이터 분석의 4단계(문제 정의하기 → 데이터 수집하기 → 데이터 분석하기 → 문제 해결하기) 중, 분석한 결과를 다른 사람과 나누고 그 타당성을 점검하는 마지막 단계에서 이루어지는 활동을 간략히 서술하시오.", "code": null, "answer": "분석 결과를 보고서나 시각 자료로 정리하여 다른 사람과 공유하고, 그 결과가 처음의 문제를 잘 해결했는지 평가하며 피드백을 반영하는 활동이 이루어진다."}]
</script>

<script>
(function(){
  "use strict";

  /* ---------- data ---------- */
  var QUESTIONS = JSON.parse(document.getElementById('quiz-data').textContent);
  var byId = {};
  QUESTIONS.forEach(function(q){ byId[q.id] = q; });

  var ROUNDS = [];
  for(var r=0;r<8;r++){
    var start = r*25+1, end = r*25+25;
    var ids = [];
    for(var i=start;i<=end;i++) ids.push(i);
    var mcqN = ids.filter(function(id){return byId[id].type==='mcq';}).length;
    var shortN = 25 - mcqN;
    ROUNDS.push({
      index:r, label:(r+1)+'회차', start:start, end:end, ids:ids,
      typeLabel: shortN===0 ? '객관식 25문항' : ('객관식 '+mcqN+' · 서술형 '+shortN)
    });
  }

  var CIRCLES = ['①','②','③','④','⑤'];

  /* ---------- storage ---------- */
  var memFallback = {};
  function storeKey(roundIdx){ return 'mca_round_'+roundIdx; }
  function safeGet(key){
    if(window.storage && window.storage.get){
      return window.storage.get(key, false).then(function(r){ return r? r.value : null; }).catch(function(){ return memFallback[key]!==undefined ? memFallback[key] : null; });
    }
    return Promise.resolve(memFallback[key]!==undefined ? memFallback[key] : null);
  }
  function safeSet(key, value){
    memFallback[key]=value;
    if(window.storage && window.storage.set){
      return window.storage.set(key, value, false).catch(function(){});
    }
    return Promise.resolve();
  }

  var progress = {}; // roundIdx -> {completed, attempts}

  function loadAllProgress(){
    var keys = ROUNDS.map(function(rd){return storeKey(rd.index);});
    return Promise.all(keys.map(function(k){return safeGet(k);})).then(function(vals){
      vals.forEach(function(v,i){
        if(v){
          try{ progress[i] = JSON.parse(v); }catch(e){ progress[i] = null; }
        }
      });
    });
  }

  function updateProgressStrip(){
    var done = ROUNDS.filter(function(rd){return progress[rd.index] && progress[rd.index].completed;}).length;
    document.getElementById('progress-fill').style.width = (done/8*100)+'%';
    document.getElementById('progress-text').textContent = done+' / 8 회차 완료';
  }

  /* ---------- helpers ---------- */
  function esc(s){
    if(s===null||s===undefined) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function nlText(s){ return esc(s); } // CSS white-space:pre-line handles \n, just escape html

  var root = document.getElementById('view-root');

  /* ---------- state ---------- */
  var state = {
    view:'menu',
    roundIdx:null,
    pool:[],        // array of question ids currently being tested
    attemptNum:1,
    answers:{},     // qid -> selected idx (mcq) or text (short, not graded by text)
    shortStatus:{}, // qid -> 'correct'|'wrong'|undefined
    graded:false,
    studentName:''
  };

  /* ---------- render: menu ---------- */
  function renderMenu(){
    state.view='menu';
    var html = '<div class="round-grid">';
    ROUNDS.forEach(function(rd){
      var p = progress[rd.index];
      var done = p && p.completed;
      html += '<div class="round-card">'+
        '<div class="rc-top">'+
          '<div class="rc-num">'+String(rd.index+1).padStart(2,'0')+'</div>'+
          '<div class="rc-badge'+(done?' done':'')+'">'+(done?'완료 ✓':'미완료')+'</div>'+
        '</div>'+
        '<div class="rc-range">'+rd.start+'~'+rd.end+'번</div>'+
        '<div class="rc-type">'+rd.typeLabel+'</div>'+
        (done ? '<div class="rc-stat">'+p.attempts+'회 만에 클리어</div>' : '')+
        '<button class="go" data-r="'+rd.index+'">'+(done?'다시 풀기':'시작하기')+'</button>'+
      '</div>';
    });
    html += '</div>';
    root.innerHTML = html;
    root.querySelectorAll('button.go').forEach(function(btn){
      btn.addEventListener('click', function(){ startRound(parseInt(btn.getAttribute('data-r'),10)); });
    });
  }

  /* ---------- start / retry ---------- */
  function startRound(idx){
    state.roundIdx = idx;
    state.pool = ROUNDS[idx].ids.slice();
    state.attemptNum = 1;
    state.answers = {};
    state.shortStatus = {};
    state.graded = false;
    state.view = 'exam';
    renderExam();
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function retryWrongOnly(){
    var wrong = computeWrongIds();
    if(wrong.length===0){ completeRound(); return; }
    state.pool = wrong;
    state.attemptNum += 1;
    state.answers = {};
    state.shortStatus = {};
    state.graded = false;
    renderExam();
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function backToMenu(){
    state.view='menu';
    renderMenu();
    window.scrollTo({top:0, behavior:'smooth'});
  }

  /* ---------- exam render ---------- */
  function renderExam(){
    var rd = ROUNDS[state.roundIdx];
    var qs = state.pool.map(function(id){return byId[id];});
    var mcqCount = qs.filter(function(q){return q.type==='mcq';}).length;
    var shortCount = qs.length-mcqCount;

    var head = '<button class="back-link" id="btn-back">← 회차 목록으로</button>'+
      '<div class="exam-head">'+
        '<div class="row1">'+
          '<div><h2>'+rd.label+' 모의고사'+(state.attemptNum>1?' · 오답 재시험':'')+'</h2>'+
          '<div class="meta">문항 범위 '+rd.start+'~'+rd.end+'번 중 '+qs.length+'문항 ('+mcqCount+'개관식 / '+shortCount+'서술형)</div></div>'+
          '<div class="attempt-chip">'+state.attemptNum+'차 응시</div>'+
        '</div>'+
        '<div class="name-field">응시자 &nbsp;<input type="text" id="student-name" placeholder="이름 (선택)" value="'+esc(state.studentName)+'"></div>'+
        '<div class="instructions">※ 객관식 문항은 보기 ①~⑤ 중 하나를 선택하고, 서술형 문항은 답안란에 직접 작성한 뒤 [채점하기]를 눌러주세요.<br>※ 채점 후 서술형 문항은 모범답안을 보고 본인이 직접 정답 여부를 표시합니다.</div>'+
      '</div>';

    var body = '<div class="exam-paper">';
    qs.forEach(function(q, i){
      body += renderQuestion(q, i+1);
    });
    body += '</div>';

    var bottom = '<div class="bottom-bar">';
    if(!state.graded){
      bottom += '<button class="btn primary" id="btn-grade">채점하기</button>';
    }
    bottom += '</div>';

    root.innerHTML = head + (state.graded? renderScoreBar(qs) : '') + body + bottom;

    document.getElementById('btn-back').addEventListener('click', backToMenu);
    var nameInput = document.getElementById('student-name');
    if(nameInput){ nameInput.addEventListener('input', function(){ state.studentName = nameInput.value; }); }

    if(!state.graded){
      // bind mcq radios
      root.querySelectorAll('input[type=radio]').forEach(function(inp){
        inp.addEventListener('change', function(){
          state.answers[inp.name] = parseInt(inp.value,10);
        });
      });
      root.querySelectorAll('textarea').forEach(function(ta){
        ta.addEventListener('input', function(){
          state.answers[ta.getAttribute('data-qid')] = ta.value;
        });
      });
      var gradeBtn = document.getElementById('btn-grade');
      if(gradeBtn) gradeBtn.addEventListener('click', gradeRound);
    } else {
      bindGradedHandlers();
    }
  }

  function renderQuestion(q, num){
    var qid = q.id;
    var html = '<div class="q-item" data-qid="'+qid+'">';
    html += '<div class="q-head"><div class="q-num">'+num+'.</div><div class="q-text">'+nlText(q.q)+(q.type==='short'?'<span class="q-tag">서술형</span>':'')+'</div></div>';
    if(q.code){
      html += '<div class="code-block">'+esc(q.code)+'</div>';
    }
    if(q.type==='mcq'){
      html += '<div class="options">';
      q.options.forEach(function(opt, idx){
        html += '<label class="opt-label"><input type="radio" name="'+qid+'" value="'+idx+'"><span class="opt-circle">'+CIRCLES[idx]+'</span><span>'+esc(opt)+'</span></label>';
      });
      html += '</div>';
    } else {
      html += '<div class="short-area"><textarea data-qid="'+qid+'" placeholder="답안을 입력하세요...">'+esc(state.answers[qid]||'')+'</textarea></div>';
    }
    html += '</div>';
    return html;
  }

  /* ---------- grading ---------- */
  function gradeRound(){
    state.graded = true;
    renderGradedExam();
  }

  function computeWrongIds(){
    var wrong = [];
    state.pool.forEach(function(qid){
      var q = byId[qid];
      if(q.type==='mcq'){
        if(state.answers[qid]!==q.answer) wrong.push(qid);
      } else {
        if(state.shortStatus[qid]==='wrong') wrong.push(qid);
      }
    });
    return wrong;
  }

  function allShortGraded(){
    return state.pool.every(function(qid){
      var q = byId[qid];
      if(q.type!=='short') return true;
      return state.shortStatus[qid]==='correct' || state.shortStatus[qid]==='wrong';
    });
  }

  function renderScoreBar(qs){
    var mcqQs = qs.filter(function(q){return q.type==='mcq';});
    var shortQs = qs.filter(function(q){return q.type==='short';});
    var mcqCorrect = mcqQs.filter(function(q){return state.answers[q.id]===q.answer;}).length;
    var shortGradedCount = shortQs.filter(function(q){return state.shortStatus[q.id];}).length;
    var shortCorrect = shortQs.filter(function(q){return state.shortStatus[q.id]==='correct';}).length;
    var totalCorrect = mcqCorrect + shortCorrect;
    var ready = allShortGraded();
    var html = '<div class="score-bar"><div class="score-card">'+
      '<div><span class="score-num">'+totalCorrect+' / '+qs.length+'</span><div class="score-label">현재까지 정답 수'+
      (shortQs.length>0 && !ready ? ' · 서술형 자가채점 '+shortGradedCount+'/'+shortQs.length+' 완료' : '')+
      '</div></div>'+
      '<div class="actions">';
    if(!ready){
      html += '<button class="btn ghost" disabled>서술형 채점 후 진행 가능</button>';
    } else {
      var wrongCount = computeWrongIds().length;
      if(wrongCount>0){
        html += '<button class="btn primary" id="btn-retry">오답만 다시 풀기 ('+wrongCount+'문항)</button>';
      } else {
        html += '<button class="btn primary" id="btn-celebrate">전체 정답! 회차 완료하기 🎉</button>';
      }
      html += '<button class="btn ghost" id="btn-tomenu">목록으로</button>';
    }
    html += '</div></div></div>';
    return html;
  }

  function renderGradedExam(){
    var rd = ROUNDS[state.roundIdx];
    var qs = state.pool.map(function(id){return byId[id];});

    var head = '<button class="back-link" id="btn-back">← 회차 목록으로</button>'+
      '<div class="exam-head">'+
        '<div class="row1">'+
          '<div><h2>'+rd.label+' 모의고사 · 채점 결과</h2>'+
          '<div class="meta">문항 범위 '+rd.start+'~'+rd.end+'번 중 '+qs.length+'문항</div></div>'+
          '<div class="attempt-chip">'+state.attemptNum+'차 응시</div>'+
        '</div>'+
      '</div>';

    var body = '<div class="exam-paper">';
    qs.forEach(function(q, i){ body += renderGradedQuestion(q, i+1); });
    body += '</div>';

    root.innerHTML = head + renderScoreBar(qs) + body;

    document.getElementById('btn-back').addEventListener('click', backToMenu);
    bindGradedHandlers();
  }

  function renderGradedQuestion(q, num){
    var qid = q.id;
    var cls = 'q-item graded';
    var stampHtml = '';
    if(q.type==='mcq'){
      var picked = state.answers[qid];
      var correct = picked===q.answer;
      cls += correct? ' correct':' wrong';
      stampHtml = '<div class="stamp'+(correct?' ok':'')+'">'+(correct?'정답':'오답')+'</div>';
    } else {
      var st = state.shortStatus[qid];
      if(st==='correct'){ cls+=' correct'; stampHtml='<div class="stamp ok">정답</div>'; }
      else if(st==='wrong'){ cls+=' wrong'; stampHtml='<div class="stamp">오답</div>'; }
    }

    var html = '<div class="'+cls+'" data-qid="'+qid+'">'+stampHtml;
    html += '<div class="q-head"><div class="q-num">'+num+'.</div><div class="q-text">'+nlText(q.q)+(q.type==='short'?'<span class="q-tag">서술형</span>':'')+'</div></div>';
    if(q.code){ html += '<div class="code-block">'+esc(q.code)+'</div>'; }

    if(q.type==='mcq'){
      html += '<div class="options">';
      q.options.forEach(function(opt, idx){
        var extra = '';
        if(idx===q.answer) extra=' is-correct';
        else if(idx===state.answers[qid]) extra=' is-wrong-pick';
        html += '<label class="opt-label'+extra+'"><span class="opt-circle">'+CIRCLES[idx]+'</span><span>'+esc(opt)+'</span></label>';
      });
      html += '</div>';
      html += '<div class="exp-box"><b>해설.</b> '+esc(q.exp)+'</div>';
    } else {
      var userText = state.answers[qid] || '(답안을 작성하지 않음)';
      html += '<div class="short-area"><div class="short-reveal">'+
        '<div class="label">내 답안</div><div class="ans">'+nlText(userText)+'</div>'+
        '</div>'+
        '<div class="short-reveal" style="margin-top:8px;">'+
        '<div class="label">모범답안 / 해설</div><div class="ans">'+nlText(q.answer)+'</div>'+
        '</div>';
      var st2 = state.shortStatus[qid];
      if(!st2){
        html += '<div class="self-grade-btns">'+
          '<button data-qid="'+qid+'" data-v="correct" class="sg-btn">⭕ 정답으로 인정</button>'+
          '<button data-qid="'+qid+'" data-v="wrong" class="sg-btn">❌ 오답으로 처리</button>'+
        '</div>';
      } else {
        html += '<div class="self-status '+st2+'">'+(st2==='correct'?'⭕ 정답으로 채점됨':'❌ 오답으로 채점됨')+
          ' <button class="sg-redo" data-qid="'+qid+'" style="margin-left:8px;background:none;border:none;color:var(--ink-faint);font-size:11px;text-decoration:underline;">다시 표시</button></div>';
      }
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  function bindGradedHandlers(){
    root.querySelectorAll('.sg-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var qid = btn.getAttribute('data-qid');
        state.shortStatus[qid] = btn.getAttribute('data-v');
        renderGradedExam();
      });
    });
    root.querySelectorAll('.sg-redo').forEach(function(btn){
      btn.addEventListener('click', function(){
        var qid = btn.getAttribute('data-qid');
        delete state.shortStatus[qid];
        renderGradedExam();
      });
    });
    var retryBtn = document.getElementById('btn-retry');
    if(retryBtn) retryBtn.addEventListener('click', retryWrongOnly);
    var celebrateBtn = document.getElementById('btn-celebrate');
    if(celebrateBtn) celebrateBtn.addEventListener('click', completeRound);
    var toMenuBtn = document.getElementById('btn-tomenu');
    if(toMenuBtn) toMenuBtn.addEventListener('click', backToMenu);
  }

  /* ---------- completion ---------- */
  function completeRound(){
    var idx = state.roundIdx;
    var data = {completed:true, attempts:state.attemptNum, clearedAt:new Date().toISOString()};
    progress[idx] = data;
    safeSet(storeKey(idx), JSON.stringify(data)).then(function(){
      updateProgressStrip();
    });
    renderCompletion();
  }

  function renderCompletion(){
    var rd = ROUNDS[state.roundIdx];
    var nextIdx = state.roundIdx+1;
    var hasNext = nextIdx < ROUNDS.length;
    var html = '<button class="back-link" id="btn-back">← 회차 목록으로</button>'+
      '<div class="complete-wrap">'+
        '<div class="big-stamp">클리어<br>완료</div>'+
        '<h3>'+rd.label+' 마스터 완료! 🎉</h3>'+
        '<p>'+state.attemptNum+'차 시도 만에 '+rd.start+'~'+rd.end+'번 문항을 모두 맞혔습니다.<br>꾸준한 인출연습이 진짜 실력이 됩니다.</p>'+
        '<div class="bottom-bar">'+
          '<button class="btn ghost" id="btn-tomenu2">회차 목록으로</button>'+
          (hasNext? '<button class="btn primary" id="btn-next">다음 회차 도전 →</button>' : '')+
        '</div>'+
      '</div>';
    root.innerHTML = html;
    document.getElementById('btn-back').addEventListener('click', backToMenu);
    document.getElementById('btn-tomenu2').addEventListener('click', backToMenu);
    var nextBtn = document.getElementById('btn-next');
    if(nextBtn) nextBtn.addEventListener('click', function(){ startRound(nextIdx); });
  }

  /* ---------- init ---------- */
  loadAllProgress().then(function(){
    updateProgressStrip();
    renderMenu();
  });

})();
</script>
</body>
</html>
